<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04040f">
<title>Ad Astra</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#04040f;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);--text:#e8e6f0;--muted:rgba(255,255,255,.4);--accent:#7b5fff;--accent2:#00e5c0;--gold:#f5c518;--font:'Helvetica Neue',Arial,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#canvas-wrap{position:fixed;inset:0;z-index:0}
canvas{display:block;width:100%;height:100%}

/* INTRO */
.intro{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1.1rem;overflow:hidden}
.intro-stars{position:absolute;inset:0;z-index:0;pointer-events:none}
.intro-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.1rem}
.intro-icon{font-size:52px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.intro-title{font-size:clamp(36px,9vw,64px);font-weight:800;letter-spacing:-1px;line-height:1}
.intro-title .grad{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.intro-sub{font-size:clamp(13px,3vw,15px);color:var(--muted);line-height:1.7;max-width:340px}
.intro-stats{display:flex;gap:20px}
.intro-stat b{display:block;font-size:clamp(24px,6vw,36px);font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.intro-stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.intro-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;padding:14px 34px;cursor:pointer;font-family:var(--font);box-shadow:0 8px 32px rgba(123,95,255,.35)}
.intro-hint{font-size:11px;color:rgba(255,255,255,.18)}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 12px;background:linear-gradient(to bottom,rgba(4,4,15,.98),rgba(4,4,15,.4))}
.logo{font-size:14px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
.logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-box{flex:1;position:relative;min-width:0}
.search-input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 28px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.4;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 5px);left:0;right:0;background:#0d0d20;border:1px solid var(--border);border-radius:12px;z-index:30;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.search-result{padding:9px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.search-result:hover{background:rgba(123,95,255,.15)}
.search-result:last-child{border-bottom:none}
.btn-icon{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font)}

/* MODE BAR */
.mode-bar{position:fixed;top:50px;left:0;right:0;z-index:18;display:flex;gap:0;background:rgba(4,4,15,.9);border-bottom:1px solid var(--border)}
.mode-btn{flex:1;padding:8px 4px;font-size:10px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font);letter-spacing:.5px;border-bottom:2px solid transparent;transition:all .15s}
.mode-btn.active{color:var(--text);border-bottom-color:var(--accent)}

/* FILTER BAR (categories + sensations) */
.filter-bar{position:fixed;top:90px;left:0;right:0;z-index:17;display:flex;gap:5px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(to bottom,rgba(4,4,15,.7),transparent)}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);font-size:10px;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.fchip.active{color:#fff;border-color:var(--chip-color);background:rgba(255,255,255,.07)}
.fchip .dot{width:6px;height:6px;border-radius:50%;background:var(--chip-color);flex-shrink:0}

/* PATHS PANEL */
.paths-panel{position:fixed;top:90px;left:0;right:0;bottom:60px;z-index:15;overflow-y:auto;padding:10px 12px;display:none}
.path-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.path-card:hover{background:rgba(255,255,255,.07)}
.path-title{font-size:15px;font-weight:700;margin-bottom:5px}
.path-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.path-nodes{display:flex;flex-wrap:wrap;gap:4px}
.path-node-chip{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6)}

/* TIMELINE PANEL */
.timeline-panel{position:fixed;top:90px;left:0;right:0;bottom:60px;z-index:15;overflow-y:auto;padding:10px 12px;display:none}
.tl-era{margin-bottom:16px;padding-left:20px;position:relative}
.tl-era::before{content:'';position:absolute;left:6px;top:8px;bottom:-8px;width:2px;background:var(--tl-color,#7b5fff);opacity:.4}
.tl-dot{position:absolute;left:0;top:6px;width:14px;height:14px;border-radius:50%;background:var(--tl-color,#7b5fff);border:2px solid var(--bg)}
.tl-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--tl-color,#7b5fff);text-transform:uppercase;margin-bottom:5px}
.tl-note{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.tl-nodes{display:flex;flex-wrap:wrap;gap:4px}
.tl-chip{font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;color:var(--text)}
.tl-chip:hover{background:rgba(255,255,255,.1)}

/* NODE PANEL */
.node-panel{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#080818;border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto}
.node-panel.open{transform:translateY(0)}
.panel-handle{width:34px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:10px auto 0}
.panel-body{padding:12px 16px 32px}
.panel-cat{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:2px 9px;border-radius:20px;border:1px solid;display:inline-block;margin-bottom:8px}
.panel-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px;line-height:1.2}
.panel-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.75;margin-bottom:14px}
.panel-section{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;margin-top:14px}
.connections-list{display:flex;flex-wrap:wrap;gap:5px}
.conn-chip{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);transition:background .15s}
.conn-chip:hover{background:rgba(255,255,255,.1)}
.conn-why{font-size:9px;color:var(--muted);margin-left:4px;cursor:pointer;opacity:.6}
.works-list{display:flex;flex-direction:column;gap:6px}
.work-item{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--surface);border-radius:9px;border:1px solid var(--border);cursor:pointer}
.work-item:hover{background:rgba(255,255,255,.08)}
.work-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.badge-libro{background:rgba(0,229,192,.1);color:var(--accent2)}
.badge-pelicula{background:rgba(123,95,255,.1);color:var(--accent)}
.badge-serie{background:rgba(245,197,24,.1);color:var(--gold)}
.badge-comic{background:rgba(255,92,122,.1);color:#ff5c7a}
.badge-videojuego{background:rgba(100,200,100,.1);color:#64c864}
.work-info{flex:1;min-width:0}
.work-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.work-author{font-size:10px;color:var(--muted)}
.close-panel{position:absolute;right:12px;top:10px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}

/* DNA BAR */
.dna-bar-wrap{margin:3px 0 2px}
.dna-bar-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.dna-bar-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.dna-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* WHY MODAL */
.why-modal{position:fixed;inset:0;z-index:60;background:rgba(4,4,15,.92);display:flex;align-items:flex-end;padding:0}
.why-content{background:#0a0a1e;border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;border-top:1px solid var(--border);max-height:60vh;overflow-y:auto}
.why-title{font-size:14px;font-weight:700;margin-bottom:8px}
.why-text{font-size:13px;color:rgba(255,255,255,.65);line-height:1.75;margin-bottom:14px}

/* SECRET NODE TOAST */
.secret-toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);z-index:50;background:linear-gradient(135deg,#1a0a3e,#0a1a3e);border:1px solid rgba(123,95,255,.4);border-radius:14px;padding:12px 16px;max-width:320px;width:90%;opacity:0;transition:opacity .5s;pointer-events:none}
.secret-toast.show{opacity:1;pointer-events:auto}

/* PROFILE PANEL */
.profile-panel{position:fixed;top:90px;left:0;right:0;bottom:60px;z-index:15;overflow-y:auto;padding:12px;display:none}
.profile-bar{margin-bottom:10px}
.profile-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.profile-bar-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.profile-bar-fill{height:100%;border-radius:4px}

/* STATS BAR */
.stats-bar{position:fixed;bottom:0;left:0;right:0;z-index:19;background:linear-gradient(to top,rgba(4,4,15,.9),transparent);padding:8px;display:flex;justify-content:center;gap:20px;pointer-events:none}
.stat{font-size:10px;color:var(--muted);text-align:center}
.stat b{display:block;font-size:16px;font-weight:700;color:var(--text)}

/* ZOOM */
.zoom-ctrl{position:fixed;right:12px;bottom:70px;z-index:20;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<script src="data.js"></script>

<!-- INTRO -->
<div class="intro" id="intro">
  <canvas class="intro-stars" id="intro-canvas"></canvas>
  <div class="intro-content">
    <div class="intro-icon">🌌</div>
    <div class="intro-title">Ad <span class="grad">Astra</span></div>
    <div class="intro-sub">Hacia las estrellas.<br>No buscas títulos. Exploras obsesiones.</div>
    <div class="intro-stats">
      <div class="intro-stat"><b id="i-nodes">—</b><span>conceptos</span></div>
      <div class="intro-stat"><b id="i-works">—</b><span>obras</span></div>
      <div class="intro-stat"><b id="i-conns">—</b><span>conexiones</span></div>
    </div>
    <button class="intro-btn" onclick="startApp()">Explorar el universo →</button>
    <div class="intro-hint">Toca · Arrastra · Descubre</div>
  </div>
</div>

<!-- MAP -->
<div id="canvas-wrap"><canvas id="map-canvas"></canvas></div>

<!-- HEADER -->
<div class="header" id="header" style="display:none">
  <div class="logo">Ad <span>Astra</span></div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="buscar concepto u obra..." autocomplete="off" oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div class="search-results" id="search-results" style="display:none"></div>
  </div>
  <button class="btn-icon" onclick="resetView()">⟳</button>
</div>

<!-- MODE BAR -->
<div class="mode-bar" id="mode-bar" style="display:none">
  <button class="mode-btn active" id="mode-mapa" onclick="setMode('mapa')">🗺 MAPA</button>
  <button class="mode-btn" id="mode-caminos" onclick="setMode('caminos')">🧭 CAMINOS</button>
  <button class="mode-btn" id="mode-sensaciones" onclick="setMode('sensaciones')">💫 SENSACIÓN</button>
  <button class="mode-btn" id="mode-cronologia" onclick="setMode('cronologia')">📅 ÉPOCA</button>
  <button class="mode-btn" id="mode-perfil" onclick="setMode('perfil')">🧬 PERFIL</button>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar" style="display:none"></div>

<!-- PATHS PANEL -->
<div class="paths-panel" id="paths-panel"></div>

<!-- TIMELINE PANEL -->
<div class="timeline-panel" id="timeline-panel"></div>

<!-- PROFILE PANEL -->
<div class="profile-panel" id="profile-panel"></div>

<!-- NODE PANEL -->
<div class="node-panel" id="node-panel">
  <div class="panel-handle"></div>
  <button class="close-panel" onclick="closePanel()">×</button>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- WHY MODAL -->
<div class="why-modal" id="why-modal" style="display:none" onclick="this.style.display='none'">
  <div class="why-content" onclick="event.stopPropagation()">
    <div class="why-title" id="why-title"></div>
    <div class="why-text" id="why-text"></div>
    <button class="btn-icon" style="width:100%;border-radius:10px;font-size:13px;color:var(--muted)" onclick="document.getElementById('why-modal').style.display='none'">cerrar</button>
  </div>
</div>

<!-- SECRET TOAST -->
<div class="secret-toast" id="secret-toast">
  <div style="font-size:12px;font-weight:700;color:#a29bfe;margin-bottom:4px">🔓 Nodo desbloqueado</div>
  <div id="secret-toast-text" style="font-size:11px;color:var(--muted);line-height:1.5"></div>
</div>

<!-- ZOOM -->
<div class="zoom-ctrl" id="zoom-ctrl" style="display:none">
  <button class="zoom-btn" onclick="zoom(1.3)">+</button>
  <button class="zoom-btn" onclick="zoom(0.77)">−</button>
</div>

<!-- STATS -->
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat"><b id="stat-nodes">0</b>conceptos</div>
  <div class="stat"><b id="stat-works">0</b>obras</div>
  <div class="stat"><b id="stat-connections">0</b>conexiones</div>
</div>

<script>
// ── CATEGORIES ─────────────────────────────────────────────
const CATEGORIES={
  tiempo:{ids:['viajes-tiempo','paradojas-temporales','universos-paralelos','realidades-simuladas','suenos-compartidos','mensajes-futuro','ecos-pasado','vidas-anteriores','recuerdos-heredados'],color:'#64c8ff',label:'Tiempo & Realidad'},
  mente:{ids:['inteligencia-artificial','conciencias-digitales','mentes-colmena','singularidad-tecnologica','posthumanismo','inmortalidad','transferencia-mental','memoria','identidad','libre-albedrio','memorias-artificiales','recuerdos-implantados','simulacros-copias','realidad-virtual'],color:'#a29bfe',label:'Mente & Tecnología'},
  contacto:{ids:['contacto-extraterrestre','primer-contacto','civilizaciones-alienígenas','lenguajes-extraterrestres','gran-silencio','bosque-oscuro','hipotesis-zoo','hipotesis-planeta-prohibido','senales-desconocidas'],color:'#00e5c0',label:'Contacto & Silencio'},
  ruinas:{ids:['arqueologia-cosmica','artefactos-alienígenas','ruinas-civilizaciones','civilizaciones-olvidadas','conocimientos-perdidos','mundos-abandonados','planetas-cementerio','ciudades-enterradas','monumentos-extintas','herederos-imperios','ruinas-orbitales','satelites-muertos','especies-desaparecidas','especies-creadoras','mensajes-extintas'],color:'#fd79a8',label:'Ruinas & Memoria'},
  megaescala:{ids:['megaestructuras','mundos-anillo','esferas-dyson','naves-generacionales','colonizacion-espacial','terraformacion','ascensores-espaciales','agujeros-negros','agujeros-gusano','universos-moribundos','fin-universo','energia-estelar','mundos-artificiales'],color:'#f5c518',label:'Megaescala & Cosmos'},
  distopia:{ids:['utopias','distopias','estados-totalitarios','vigilancia-absoluta','corporaciones-omnipotentes','escasez-abundancia','religiones-futuro','mesias-tecnologicos'],color:'#ff7675',label:'Utopía & Distopía'},
  biologia:{ids:['clonacion','ingenieria-genetica','mutacion','evolucion-dirigida','ecologias-alienígenas','oceanos-conscientes','inteligencias-planetarias'],color:'#55efc4',label:'Biología & Evolución'},
  misterio:{ids:['lo-incomprensible','entidades-cosmicas','dioses-alienígenas','falsos-dioses','observadores-invisibles','presencias-desconocidas','habitantes-dimensiones','objetos-lugar','tecnologias-incomprensibles','reliquias-imposibles','naves-fantasma','viajeros-extraviados'],color:'#e17055',label:'Misterio & Horror'},
  finales:{ids:['ultima-pregunta','fin-humanidad','ultimo-hombre','ultima-ciudad','ultima-biblioteca','ultima-nave','ultimos-supervivientes','nostalgia-futuro'],color:'#b2bec3',label:'Finales & Nostalgia'},
  bibliotecas:{ids:['bibliotecas-infinitas','archivos-prohibidos','cartografias-perdidas','mapas-ninguna-parte'],color:'#fdcb6e',label:'Conocimiento & Mapas'},
};
const nodeCatColor={},nodeCatKey={};
Object.entries(CATEGORIES).forEach(([k,{ids,color}])=>ids.forEach(id=>{nodeCatColor[id]=color;nodeCatKey[id]=k;}));

const nodeIds=Object.keys(NODES);
nodeIds.forEach(id=>{if(!nodeCatColor[id])nodeCatColor[id]='#7b5fff';});

// Include secret nodes
Object.values(SECRET_NODES).forEach(sn=>{
  NODES[sn.id]=sn;
  nodeCatColor[sn.id]=sn.color||'#ffffff';
});

let totalWorks=0,totalConns=0;
nodeIds.forEach(id=>{totalWorks+=NODES[id].works.length;totalConns+=NODES[id].connections.length;});
totalConns=Math.round(totalConns/2);

document.getElementById('i-nodes').textContent=nodeIds.length;
document.getElementById('i-works').textContent=totalWorks;
document.getElementById('i-conns').textContent=totalConns;

const edgeWeights={};
nodeIds.forEach(id=>{
  NODES[id].connections.forEach(cid=>{
    if(!NODES[cid])return;
    const key=[id,cid].sort().join('||');
    if(!edgeWeights[key]){
      const wa=new Set(NODES[id].works.map(w=>w.title));
      const wb=new Set((NODES[cid].works||[]).map(w=>w.title));
      edgeWeights[key]=1+[...wa].filter(t=>wb.has(t)).length*2;
    }
  });
});

// ── USER PROFILE (local) ────────────────────────────────────
const profile=JSON.parse(localStorage.getItem('ad-astra-profile')||'{}');
const visitedNodes=new Set(JSON.parse(localStorage.getItem('ad-astra-visited')||'[]'));
function recordVisit(id){
  visitedNodes.add(id);
  const cat=nodeCatKey[id];
  if(cat){profile[cat]=(profile[cat]||0)+1;}
  localStorage.setItem('ad-astra-profile',JSON.stringify(profile));
  localStorage.setItem('ad-astra-visited',JSON.stringify([...visitedNodes]));
  checkSecretNodes();
}
function checkSecretNodes(){
  Object.values(SECRET_NODES).forEach(sn=>{
    if(visitedNodes.has(sn.id))return;
    const unlocked=sn.unlockCondition.every(c=>visitedNodes.has(c));
    if(unlocked){
      visitedNodes.add(sn.id);
      localStorage.setItem('ad-astra-visited',JSON.stringify([...visitedNodes]));
      showSecretToast(sn);
    }
  });
}
function showSecretToast(sn){
  const toast=document.getElementById('secret-toast');
  document.getElementById('secret-toast-text').textContent=sn.unlockText;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),5000);
}

// ── INTRO STARS ─────────────────────────────────────────────
const ic=document.getElementById('intro-canvas');
const ictx=ic.getContext('2d');
const stars=[];
let introRun=true;
function resizeIntro(){ic.width=window.innerWidth;ic.height=window.innerHeight;}
function initStars(){stars.length=0;for(let i=0;i<200;i++)stars.push({x:Math.random()*ic.width,y:Math.random()*ic.height,r:Math.random()*1.5+.3,a:Math.random(),da:(.002+Math.random()*.005)*(Math.random()<.5?1:-1)});}
function animStars(ts){
  if(!introRun)return;
  ictx.clearRect(0,0,ic.width,ic.height);
  stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ictx.fillStyle=`rgba(255,255,255,${s.a*.7})`;ictx.beginPath();ictx.arc(s.x,s.y,s.r,0,Math.PI*2);ictx.fill();});
  requestAnimationFrame(animStars);
}
resizeIntro();initStars();requestAnimationFrame(animStars);
window.addEventListener('resize',resizeIntro);

// ── MAP CANVAS ──────────────────────────────────────────────
const canvas=document.getElementById('map-canvas');
const ctx=canvas.getContext('2d');
let W,H;
let camX=0,camY=0,scale=1;
let dragging=false,didDrag=false,dragStartX,dragStartY,camStartX,camStartY;
let pinching=false,pinchDist=0;
let animating=true,selectedNode=null,hoveredNode=null;
let activeFilter=null,filterType=null; // filterType: 'cat'|'sensation'
const nodePositions={},nodeVelocities={};
const visibleNodes=new Set(nodeIds); // all visible by default (secrets hidden until unlocked)

function resize(){
  const dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function toScreen(x,y){return{x:W/2+(x-camX)*scale,y:H/2+(y-camY)*scale};}
function toWorld(sx,sy){return{x:(sx-W/2)/scale+camX,y:(sy-H/2)/scale+camY};}
function nodeSize(id){return 7+(NODES[id]?.connections?.length||0)*1.1;}

// ── LAYOUT ──────────────────────────────────────────────────
function initLayout(){
  const catCenters={};
  const catList=Object.keys(CATEGORIES);
  catList.forEach((cat,ci)=>{const a=(ci/catList.length)*Math.PI*2;catCenters[cat]={x:Math.cos(a)*380,y:Math.sin(a)*380};});
  nodeIds.forEach(id=>{
    const c=catCenters[nodeCatKey[id]]||{x:0,y:0};
    nodePositions[id]={x:c.x+(Math.random()-.5)*160,y:c.y+(Math.random()-.5)*160};
    nodeVelocities[id]={x:0,y:0};
  });
  Object.values(SECRET_NODES).forEach(sn=>{
    nodePositions[sn.id]={x:(Math.random()-.5)*200,y:(Math.random()-.5)*200};
    nodeVelocities[sn.id]={x:0,y:0};
  });
  for(let i=0;i<300;i++)forceStep(i<150?.4:i<250?.2:.1);
}

function forceStep(damp=0.12){
  const allIds=[...nodeIds,...Object.keys(SECRET_NODES)];
  const rep=5500,att=0.025,ideal=130;
  const forces={};
  allIds.forEach(id=>{forces[id]={x:0,y:0};});
  for(let i=0;i<allIds.length;i++){
    for(let j=i+1;j<allIds.length;j++){
      const a=allIds[i],b=allIds[j];
      if(!nodePositions[a]||!nodePositions[b])continue;
      const dx=nodePositions[b].x-nodePositions[a].x,dy=nodePositions[b].y-nodePositions[a].y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=rep/(d*d);
      forces[a].x-=dx/d*f;forces[a].y-=dy/d*f;
      forces[b].x+=dx/d*f;forces[b].y+=dy/d*f;
    }
  }
  allIds.forEach(id=>{
    if(!nodePositions[id])return;
    (NODES[id]?.connections||[]).forEach(cid=>{
      if(!nodePositions[cid])return;
      const dx=nodePositions[cid].x-nodePositions[id].x,dy=nodePositions[cid].y-nodePositions[id].y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=att*(d-ideal);
      forces[id].x+=dx/d*f;forces[id].y+=dy/d*f;
    });
    forces[id].x-=nodePositions[id].x*.001;
    forces[id].y-=nodePositions[id].y*.001;
  });
  allIds.forEach(id=>{
    if(!nodePositions[id])return;
    nodeVelocities[id].x=(nodeVelocities[id].x+forces[id].x)*damp;
    nodeVelocities[id].y=(nodeVelocities[id].y+forces[id].y)*damp;
    nodePositions[id].x+=nodeVelocities[id].x;
    nodePositions[id].y+=nodeVelocities[id].y;
  });
}

// ── ENTRANCE ────────────────────────────────────────────────
let entranceProgress=0,entranceActive=false,entranceStart=null;
const ENTRANCE_DUR=1400;
function startEntrance(){entranceActive=true;entranceStart=null;entranceProgress=0;}
function easeOut(t){return 1-Math.pow(1-t,3);}
function getPos(id,ts){
  if(!entranceActive||!nodePositions[id])return nodePositions[id];
  if(!entranceStart)entranceStart=ts;
  entranceProgress=Math.min(1,(ts-entranceStart)/ENTRANCE_DUR);
  if(entranceProgress>=1){entranceActive=false;return nodePositions[id];}
  const idx=nodeIds.indexOf(id);
  const stagger=Math.max(0,idx/nodeIds.length*.45);
  const t=Math.max(0,Math.min(1,(entranceProgress-stagger)/(1-stagger)));
  const te=easeOut(t);
  return{x:nodePositions[id].x*te,y:nodePositions[id].y*te};
}

// ── DRAW ────────────────────────────────────────────────────
function isNodeVisible(id){
  if(SECRET_NODES[id]&&!visitedNodes.has(id))return false;
  if(!activeFilter)return true;
  if(filterType==='cat')return nodeCatKey[id]===activeFilter;
  if(filterType==='sensation')return (SENSATIONS[activeFilter]?.nodes||[]).includes(id);
  if(filterType==='path'){const path=PATHS.find(p=>p.id===activeFilter);return path?path.nodes.includes(id):true;}
  return true;
}

function draw(ts){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.85);
  bg.addColorStop(0,'#080820');bg.addColorStop(1,'#04040f');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  const allDrawIds=[...nodeIds,...Object.keys(SECRET_NODES).filter(id=>visitedNodes.has(id))];

  // edges
  allDrawIds.forEach(id=>{
    const pa=getPos(id,ts);if(!pa)return;
    const sa=toScreen(pa.x,pa.y);
    (NODES[id]?.connections||[]).forEach(cid=>{
      if(cid<id)return;
      const pb=getPos(cid,ts);if(!pb)return;
      const sb=toScreen(pb.x,pb.y);
      const key=[id,cid].sort().join('||');
      const w=edgeWeights[key]||1;
      const isAct=selectedNode===id||selectedNode===cid;
      const visA=isNodeVisible(id),visB=isNodeVisible(cid);
      if(!visA&&!visB)return;
      const dim=!visA||!visB;
      ctx.beginPath();ctx.moveTo(sa.x,sa.y);ctx.lineTo(sb.x,sb.y);
      if(isAct){
        const g=ctx.createLinearGradient(sa.x,sa.y,sb.x,sb.y);
        g.addColorStop(0,nodeCatColor[id]+'cc');g.addColorStop(1,nodeCatColor[cid]+'cc');
        ctx.strokeStyle=g;ctx.lineWidth=Math.min(w*.9,4);
      } else {
        ctx.strokeStyle=`rgba(255,255,255,${dim?.025:Math.min(.04+w*.012,.1)})`;
        ctx.lineWidth=Math.min(w*.4,1.5);
      }
      ctx.stroke();
    });
  });

  // nodes
  allDrawIds.forEach(id=>{
    const p=getPos(id,ts);if(!p)return;
    const isSecret=!!SECRET_NODES[id];
    if(isSecret&&!visitedNodes.has(id))return;
    const s=toScreen(p.x,p.y);
    const r=nodeSize(id)*scale;
    const col=isSecret?'#ffffff':nodeCatColor[id];
    const isSel=selectedNode===id,isHov=hoveredNode===id;
    const isConn=selectedNode&&(NODES[selectedNode]?.connections||[]).includes(id);
    const vis=isNodeVisible(id);
    const isDim=(selectedNode&&!isSel&&!isConn)||!vis;

    if(isSel||isHov){
      const gw=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,r*4);
      gw.addColorStop(0,col+'55');gw.addColorStop(1,'transparent');
      ctx.fillStyle=gw;ctx.beginPath();ctx.arc(s.x,s.y,r*4,0,Math.PI*2);ctx.fill();
    }
    const ng=ctx.createRadialGradient(s.x-r*.3,s.y-r*.3,0,s.x,s.y,r);
    ng.addColorStop(0,isSel?'#fff':col+(isDim?'33':'ff'));
    ng.addColorStop(1,col+(isSel?'cc':isDim?'11':'77'));
    ctx.fillStyle=ng;ctx.globalAlpha=isDim?.15:1;
    ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    if(isSecret){
      ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.arc(s.x,s.y,r+4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
    if(isSel){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(s.x,s.y,r+7,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    if(isConn){ctx.strokeStyle=col+'cc';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(s.x,s.y,r+3,0,Math.PI*2);ctx.stroke();}

    if((scale>.4||isSel||isHov)&&(!isDim||isSel)){
      const fs=Math.max(9,Math.min(13,10*scale));
      ctx.font=`${isSel||isConn?'700':'500'} ${fs}px 'Helvetica Neue',sans-serif`;
      ctx.textAlign='center';
      const op=scale<.5?Math.max(0,(scale-.4)/.1):1;
      ctx.fillStyle=isSecret?`rgba(255,255,255,${op})`
        :isSel?`rgba(255,255,255,${op})`:`rgba(255,255,255,${op*(isConn?.9:.6)})`;
      ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=6;
      ctx.fillText(NODES[id].label,s.x,s.y+r+fs+2);ctx.shadowBlur=0;
    }
  });
}

// ── HIT TEST ────────────────────────────────────────────────
function hitTest(sx,sy){
  let best=null,bd=Infinity;
  const allIds=[...nodeIds,...Object.keys(SECRET_NODES).filter(id=>visitedNodes.has(id))];
  allIds.forEach(id=>{
    const p=nodePositions[id];if(!p)return;
    const s=toScreen(p.x,p.y);
    const r=(nodeSize(id)+10)*scale;
    const d=Math.sqrt((sx-s.x)**2+(sy-s.y)**2);
    if(d<r&&d<bd){bd=d;best=id;}
  });
  return best;
}

// ── INTERACTION ─────────────────────────────────────────────
canvas.addEventListener('mousedown',e=>{dragging=true;didDrag=false;dragStartX=e.clientX;dragStartY=e.clientY;camStartX=camX;camStartY=camY;});
canvas.addEventListener('mousemove',e=>{
  if(dragging){const dx=e.clientX-dragStartX,dy=e.clientY-dragStartY;if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;camX=camStartX-dx/scale;camY=camStartY-dy/scale;}
  else{hoveredNode=hitTest(e.clientX,e.clientY);canvas.style.cursor=hoveredNode?'pointer':'grab';}
});
canvas.addEventListener('mouseup',e=>{dragging=false;if(!didDrag){const h=hitTest(e.clientX,e.clientY);if(h)openNode(h);else closePanel();}});
canvas.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.88:1.14;const w=toWorld(e.clientX,e.clientY);scale=Math.max(.12,Math.min(5,scale*f));camX=w.x-(e.clientX-W/2)/scale;camY=w.y-(e.clientY-H/2)/scale;},{passive:false});

canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;didDrag=false;const t=e.touches[0];dragStartX=t.clientX;dragStartY=t.clientY;camStartX=camX;camStartY=camY;}
  else if(e.touches.length===2){dragging=false;pinching=true;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchDist=Math.sqrt(dx*dx+dy*dy);}
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(dragging&&e.touches.length===1){const t=e.touches[0];const dx=t.clientX-dragStartX,dy=t.clientY-dragStartY;if(Math.abs(dx)>5||Math.abs(dy)>5)didDrag=true;camX=camStartX-dx/scale;camY=camStartY-dy/scale;}
  else if(pinching&&e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy);const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;const w=toWorld(mx,my);scale=Math.max(.12,Math.min(5,scale*dist/pinchDist));camX=w.x-(mx-W/2)/scale;camY=w.y-(my-H/2)/scale;pinchDist=dist;}
},{passive:false});
canvas.addEventListener('touchend',e=>{const wp=pinching;dragging=false;pinching=false;if(!didDrag&&!wp&&e.changedTouches.length>0){const t=e.changedTouches[0];const h=hitTest(t.clientX,t.clientY);if(h)openNode(h);}},{passive:true});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))document.getElementById('search-results').style.display='none';});

// ── PANEL ────────────────────────────────────────────────────
const TYPE_L={libro:'📖 Libro',pelicula:'🎬 Película',serie:'📺 Serie',comic:'📓 Cómic',videojuego:'🎮 Videojuego'};
const TYPE_B={libro:'badge-libro',pelicula:'badge-pelicula',serie:'badge-serie',comic:'badge-comic',videojuego:'badge-videojuego'};

function openNode(id){
  selectedNode=id;
  recordVisit(id);
  const node=NODES[id];if(!node)return;
  const col=nodeCatColor[id];
  const catLabel=nodeCatKey[id]?CATEGORIES[nodeCatKey[id]]?.label:(SECRET_NODES[id]?'✦ Nodo secreto':'Concepto');

  // Find DNA for this node's works
  const dnaEntries=Object.entries(WORK_DNA).filter(([_,d])=>d.dna.some(e=>e.node===id));

  document.getElementById('panel-body').innerHTML=`
    <span class="panel-cat" style="color:${col};border-color:${col}33;background:${col}11">${catLabel}</span>
    <div class="panel-title">${node.label}</div>
    <div class="panel-desc">${node.desc}</div>
    <div class="panel-section">conexiones · ${(node.connections||[]).filter(c=>NODES[c]).length}</div>
    <div class="connections-list">
      ${(node.connections||[]).filter(c=>NODES[c]).map(cid=>{
        const key=[id,cid].sort().join('||');
        const hasReason=!!EDGE_REASONS[key];
        return `<span class="conn-chip" style="border-color:${nodeCatColor[cid]}44;color:${nodeCatColor[cid]}" onclick="openNode('${cid}')">${NODES[cid].label}</span>${hasReason?`<span class="conn-why" onclick="showWhy('${id}','${cid}')">¿por qué?</span>`:''}`;
      }).join('')}
    </div>
    ${dnaEntries.length?`
    <div class="panel-section">ADN en obras</div>
    ${dnaEntries.slice(0,3).map(([title,d])=>{
      const entry=d.dna.find(e=>e.node===id);
      return `<div class="dna-bar-wrap">
        <div class="dna-bar-label">${title}</div>
        <div class="dna-bar-track"><div class="dna-bar-fill" style="width:${entry.pct}%;background:${col}"></div></div>
      </div>`;
    }).join('')}`:''}
    <div class="panel-section">obras · ${node.works.length}</div>
    <div class="works-list">
      ${node.works.map(w=>`
        <div class="work-item" onclick="showWorkDNA('${w.title.replace(/'/g,"\\'")}')">
          <span class="work-badge ${TYPE_B[w.type]||'badge-libro'}">${TYPE_L[w.type]||w.type}</span>
          <div class="work-info"><div class="work-title">${w.title}</div><div class="work-author">${w.author}</div></div>
          <span style="font-size:10px;color:var(--muted)">ADN →</span>
        </div>`).join('')}
    </div>`;
  document.getElementById('node-panel').classList.add('open');
  const p=nodePositions[id];if(p){camX+=(p.x-camX)*.4;camY+=(p.y-camY)*.4;}
}

function closePanel(){selectedNode=null;document.getElementById('node-panel').classList.remove('open');}

function showWhy(id1,id2){
  const key=[id1,id2].sort().join('||');
  const reason=EDGE_REASONS[key];
  if(!reason)return;
  document.getElementById('why-title').textContent=`${NODES[id1].label} ↔ ${NODES[id2].label}`;
  document.getElementById('why-text').textContent=reason;
  document.getElementById('why-modal').style.display='flex';
}

function showWorkDNA(title){
  const dna=WORK_DNA[title];
  if(!dna){return;}
  const modal=document.getElementById('why-modal');
  document.getElementById('why-title').textContent=`ADN de "${title}"`;
  document.getElementById('why-text').innerHTML=dna.dna.map(e=>`
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="cursor:pointer;color:${nodeCatColor[e.node]||'#fff'}" onclick="openNode('${e.node}');document.getElementById('why-modal').style.display='none'">${NODES[e.node]?.label||e.node}</span>
        <span style="color:var(--muted)">${e.pct}%</span>
      </div>
      <div class="dna-bar-track"><div class="dna-bar-fill" style="width:${e.pct}%;background:${nodeCatColor[e.node]||'#7b5fff'}"></div></div>
    </div>`).join('');
  modal.style.display='flex';
}

// ── SEARCH ──────────────────────────────────────────────────
function onSearch(q){
  const res=document.getElementById('search-results');
  if(!q.trim()){res.style.display='none';return;}
  const ql=q.toLowerCase();
  const nodeMatches=nodeIds.filter(id=>NODES[id].label.toLowerCase().includes(ql)).slice(0,4);
  const workMatches=[];
  nodeIds.forEach(id=>NODES[id].works.forEach(w=>{if(w.title.toLowerCase().includes(ql)&&workMatches.length<3)workMatches.push({work:w,nodeId:id});}));
  if(!nodeMatches.length&&!workMatches.length){res.style.display='none';return;}
  res.style.display='block';
  res.innerHTML=
    nodeMatches.map(id=>`<div class="search-result" onclick="goToNode('${id}')"><span style="color:${nodeCatColor[id]};font-size:10px">●</span> <b>${NODES[id].label}</b></div>`).join('')+
    workMatches.map(({work,nodeId})=>`<div class="search-result" onclick="goToNode('${nodeId}');showWorkDNA('${work.title.replace(/'/g,"\\'")}')"><span style="font-size:10px">${TYPE_L[work.type]||'📖'}</span> ${work.title} <span style="color:var(--muted);font-size:10px">→ ${NODES[nodeId].label}</span></div>`).join('');
}
function goToNode(id){
  document.getElementById('search-input').value='';
  document.getElementById('search-results').style.display='none';
  const p=nodePositions[id];if(p){camX=p.x;camY=p.y;}
  scale=1.3;setMode('mapa');openNode(id);
}

// ── MODES ────────────────────────────────────────────────────
let currentMode='mapa';
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));

// ── FILTER BAR ───────────────────────────────────────────────
function buildFilterBar(type){
  const bar=document.getElementById('filter-bar');
  const items=type==='cat'?
    [['null','todo',{color:'#7b5fff'}],...Object.entries(CATEGORIES).map(([k,v])=>[k,v.label,v])]:
    [['null','todo',{color:'#7b5fff'}],...Object.entries(SENSATIONS).map(([k,v])=>[k,v.label+' '+v.emoji,v])];
  bar.innerHTML=items.map(([k,label,{color}])=>`
    <span class="fchip${activeFilter===k||(!activeFilter&&k==='null')?' active':''}" id="fc-${k}" style="--chip-color:${color}" onclick="setFilter('${k}','${type}')">
      <span class="dot" style="background:${color}"></span>${label}
    </span>`).join('');
}

function setFilter(key,type){
  activeFilter=key==='null'?null:key;
  filterType=activeFilter?type:null;
  closePanel();
  document.querySelectorAll('.fchip').forEach(e=>e.classList.remove('active'));
  document.getElementById('fc-'+key)?.classList.add('active');
  // Make sure canvas is interactive in map/sensation modes
  if(type==='cat'||type==='sensation') canvas.style.pointerEvents='auto';
}

// ── PATHS PANEL ──────────────────────────────────────────────
function buildPathsPanel(){
  const panel=document.getElementById('paths-panel');
  panel.innerHTML=`<div style="font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase">Itinerarios temáticos · ${PATHS.length} caminos</div>`+
  PATHS.map(path=>`
    <div class="path-card" style="border-color:${path.color}33" onclick="startPath('${path.id}')">
      <div class="path-title">${path.emoji} ${path.title}</div>
      <div class="path-desc">${path.desc}</div>
      <div class="path-nodes">
        ${path.nodes.filter(id=>NODES[id]).map(id=>`
          <span class="path-node-chip" style="border-color:${nodeCatColor[id]}44;color:${nodeCatColor[id]}">${NODES[id].label}</span>
        `).join('')}
      </div>
    </div>`).join('');
}

function startPath(pathId){
  const path=PATHS.find(p=>p.id===pathId);if(!path)return;
  setMode('mapa');
  activeFilter=pathId;filterType='path';
  const firstId=path.nodes.find(id=>nodePositions[id]);
  if(firstId){camX=nodePositions[firstId].x;camY=nodePositions[firstId].y;scale=.85;}
  setTimeout(()=>openNode(firstId),300);
}



// ── TIMELINE ─────────────────────────────────────────────────
function buildTimeline(){
  const panel=document.getElementById('timeline-panel');
  panel.innerHTML=`<div style="font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase">Evolución histórica de las ideas</div>`+
  TIMELINE.map(era=>`
    <div class="tl-era" style="--tl-color:${era.color}">
      <div class="tl-dot"></div>
      <div class="tl-label">${era.label}</div>
      <div class="tl-note">${era.note}</div>
      <div class="tl-nodes">
        ${era.nodes.filter(id=>NODES[id]).map(id=>`
          <span class="tl-chip" onclick="goToNode('${id}')">${NODES[id].label}</span>
        `).join('')}
      </div>
    </div>`).join('');
}

// ── PROFILE ──────────────────────────────────────────────────
function buildProfile(){
  const panel=document.getElementById('profile-panel');
  const total=Object.values(profile).reduce((a,b)=>a+b,0)||1;
  const sorted=Object.entries(profile).sort((a,b)=>b[1]-a[1]);
  const visitCount=visitedNodes.size;
  const secretCount=Object.keys(SECRET_NODES).filter(id=>visitedNodes.has(id)).length;

  if(!visitCount){
    panel.innerHTML=`<div style="text-align:center;padding:3rem;color:var(--muted)">
      <div style="font-size:36px;margin-bottom:12px">🧬</div>
      <div style="font-size:14px">Tu perfil se construye mientras exploras.</div>
      <div style="font-size:12px;margin-top:6px;color:rgba(255,255,255,.3)">Visita conceptos en el mapa para ver tus obsesiones.</div>
    </div>`;
    return;
  }

  panel.innerHTML=`
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase">Tu ADN de lector</div>
    <div style="display:flex;gap:16px;margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:12px;padding:12px;border:1px solid var(--border)">
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:800;color:var(--text)">${visitCount}</div><div style="font-size:10px;color:var(--muted)">conceptos visitados</div></div>
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:800;color:#a29bfe">${secretCount}</div><div style="font-size:10px;color:var(--muted)">nodos secretos</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase">Obsesiones principales</div>
    ${sorted.map(([cat,count])=>{
      const pct=Math.round(count/total*100);
      const {color,label}=CATEGORIES[cat]||{color:'#7b5fff',label:cat};
      return `<div class="profile-bar">
        <div class="profile-bar-label"><span>${label}</span><span style="color:var(--muted)">${pct}%</span></div>
        <div class="profile-bar-track"><div class="profile-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('')}
    ${secretCount<Object.keys(SECRET_NODES).length?`
    <div style="margin-top:16px;padding:10px 12px;background:rgba(123,95,255,.08);border-radius:10px;border:1px solid rgba(123,95,255,.2)">
      <div style="font-size:11px;font-weight:600;color:#a29bfe;margin-bottom:4px">🔒 ${Object.keys(SECRET_NODES).length-secretCount} nodo${Object.keys(SECRET_NODES).length-secretCount>1?'s':''} secreto${Object.keys(SECRET_NODES).length-secretCount>1?'s':''} por descubrir</div>
      <div style="font-size:11px;color:var(--muted)">Sigue explorando para desbloquearlos.</div>
    </div>`:'<div style="margin-top:16px;text-align:center;font-size:12px;color:#a29bfe">✦ Has desbloqueado todos los nodos secretos</div>'}`;
}

// ── CONTROLS ─────────────────────────────────────────────────
function zoom(f){scale=Math.max(.12,Math.min(5,scale*f));}
function resetView(){camX=0;camY=0;scale=.75;closePanel();activeFilter=null;filterType=null;buildFilterBar('cat');}

// ── START ────────────────────────────────────────────────────
function startApp(){
  introRun=false;
  document.getElementById('intro').style.display='none';
  document.getElementById('header').style.display='flex';
  document.getElementById('mode-bar').style.display='flex';
  document.getElementById('filter-bar').style.display='flex';
  document.getElementById('zoom-ctrl').style.display='flex';
  document.getElementById('stats-bar').style.display='flex';
  document.getElementById('stat-nodes').textContent=nodeIds.length;
  document.getElementById('stat-works').textContent=totalWorks;
  document.getElementById('stat-connections').textContent=totalConns;
  // Force canvas resize now that it's the only visible element
  setTimeout(()=>{
    resize();
    resetView();
    buildFilterBar('cat');
    startEntrance();
  }, 50);
}

// ── LOOP ─────────────────────────────────────────────────────
function loop(ts){
  if(animating)forceStep(.035);
  draw(ts);
  requestAnimationFrame(loop);
}

// ── BOOT ─────────────────────────────────────────────────────
resize();
window.addEventListener('resize',resize);

// Verify data loaded
if(typeof NODES === 'undefined' || Object.keys(NODES).length === 0){
  document.querySelector('.intro-sub').textContent = 'Error cargando datos. Recarga la página.';
} else {
  initLayout();
  requestAnimationFrame(loop);
}

// Unregister old service workers to fix caching issues
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).then(()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
