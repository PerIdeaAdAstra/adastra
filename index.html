<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04040f">
<title>Ad Astra</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#04040f;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);--text:#e8e6f0;--muted:rgba(255,255,255,.4);--accent:#7b5fff;--accent2:#00e5c0;--gold:#f5c518;--font:'Helvetica Neue',Arial,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#three-wrap{position:fixed;inset:0;z-index:0;transition:right .32s cubic-bezier(.4,0,.2,1)}
#three-wrap canvas{display:block}

/* ── INTRO ── */
.intro{position:fixed;inset:0;z-index:50;overflow:hidden;cursor:pointer}
#intro-canvas{position:absolute;inset:0;width:100%;height:100%}
.intro-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;user-select:none}
.intro-ad{font-size:clamp(18px,4vw,28px);font-weight:300;letter-spacing:clamp(8px,3vw,20px);color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:8px;animation:fadeIn 2s ease forwards}
.intro-astra{font-size:clamp(56px,14vw,120px);font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#ffffff 0%,#a29bfe 40%,#00e5c0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeIn 2s ease .3s both}
.intro-sub{font-size:clamp(11px,2vw,14px);color:rgba(255,255,255,.2);letter-spacing:4px;text-transform:uppercase;margin-top:24px;animation:fadeIn 2s ease .8s both}
.intro-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.15);letter-spacing:3px;text-transform:uppercase;animation:pulse 2s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.15}50%{opacity:.4}}

/* ── HEADER ── */
.header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 12px;background:linear-gradient(to bottom,rgba(4,4,15,.98),rgba(4,4,15,.3));transition:right .32s}
.logo{font-size:13px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
.logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-box{flex:1;position:relative;min-width:0}
.search-input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 28px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.4;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 5px);left:0;right:0;background:#0d0d20;border:1px solid var(--border);border-radius:12px;z-index:40;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.search-result{padding:9px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.search-result:hover{background:rgba(123,95,255,.15)}
.search-result:last-child{border-bottom:none}
.btn-icon{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── MODE BAR ── */
.mode-bar{position:fixed;top:50px;left:0;right:0;z-index:18;display:flex;background:rgba(4,4,15,.92);border-bottom:1px solid var(--border);transition:right .32s}
.mode-btn{flex:1;padding:7px 4px;font-size:10px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font);letter-spacing:.3px;border-bottom:2px solid transparent;transition:all .15s}
.mode-btn.active{color:var(--text);border-bottom-color:var(--accent)}

/* ── FILTER BAR ── */
.filter-bar{position:fixed;top:88px;left:0;right:0;z-index:17;display:flex;gap:5px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(to bottom,rgba(4,4,15,.7),transparent);transition:right .32s}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:10px;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.fchip.active{color:#fff;border-color:var(--chip-color);background:rgba(255,255,255,.07)}
.fchip .dot{width:6px;height:6px;border-radius:50%;background:var(--chip-color);flex-shrink:0}

/* ── SIDE PANEL ── */
.side-panel{position:fixed;top:0;right:0;bottom:0;width:min(400px,40vw);z-index:30;background:#06060f;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.side-panel.open{transform:translateX(0)}
.panel-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;background:#06060f;border-bottom:1px solid var(--border);z-index:1;flex-shrink:0}
.panel-head-title{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.panel-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px}
.panel-scroll{overflow-y:auto;flex:1;padding:14px 14px 40px}
@media(max-width:640px){
  .side-panel{top:auto;right:0;left:0;width:100%;height:65vh;border-left:none;border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%)}
  .side-panel.open{transform:translateY(0)}
}

/* ── PANEL CONTENT ── */
.panel-cat-badge{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 9px;border-radius:20px;border:1px solid;display:inline-block;margin-bottom:8px}
.panel-title{font-size:19px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;line-height:1.2}
.panel-desc{font-size:13px;color:rgba(255,255,255,.58);line-height:1.75;margin-bottom:4px}
.section-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
.conn-list{display:flex;flex-wrap:wrap;gap:5px}
.conn-chip{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);transition:background .15s;color:var(--text)}
.conn-chip:hover{background:rgba(255,255,255,.1)}
.conn-why{font-size:9px;color:var(--muted);cursor:pointer;margin-left:2px;opacity:.6}
.works-list{display:flex;flex-direction:column;gap:6px}
.work-card{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--surface);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:background .15s}
.work-card:hover{background:rgba(255,255,255,.08)}
.work-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.badge-libro{background:rgba(0,229,192,.1);color:var(--accent2)}
.badge-pelicula{background:rgba(123,95,255,.1);color:var(--accent)}
.badge-serie{background:rgba(245,197,24,.1);color:var(--gold)}
.badge-comic{background:rgba(255,92,122,.1);color:#ff5c7a}
.badge-videojuego{background:rgba(100,200,100,.1);color:#64c864}
.work-info{flex:1;min-width:0}
.work-title-text{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.work-author-text{font-size:11px;color:var(--muted);cursor:pointer}
.work-author-text:hover{color:var(--accent2);text-decoration:underline}
.dna-row{margin:3px 0}
.dna-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-top:2px}
.dna-fill{height:100%;border-radius:3px}

/* ── FULL PANELS ── */
.full-panel{position:fixed;top:88px;left:0;right:0;bottom:52px;z-index:15;overflow-y:auto;padding:10px 14px;display:none}
.path-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.path-card:hover{background:rgba(255,255,255,.07)}
.path-nodes{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.path-node-chip{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55)}
.tl-era{margin-bottom:16px;padding-left:20px;position:relative}
.tl-era::before{content:'';position:absolute;left:6px;top:8px;bottom:-8px;width:2px;background:var(--tl-color,#7b5fff);opacity:.35}
.tl-dot{position:absolute;left:0;top:6px;width:13px;height:13px;border-radius:50%;background:var(--tl-color);border:2px solid var(--bg)}
.tl-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--tl-color);text-transform:uppercase;margin-bottom:4px}
.tl-note{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:7px}
.tl-nodes{display:flex;flex-wrap:wrap;gap:4px}
.tl-chip{font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;color:var(--text)}
.tl-chip:hover{background:rgba(255,255,255,.1)}
.profile-bar{margin-bottom:10px}
.profile-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.profile-bar-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.profile-bar-fill{height:100%;border-radius:4px}

/* ── WORK MODAL ── */
.work-modal{position:fixed;inset:0;z-index:60;background:rgba(4,4,15,.88);display:flex;align-items:center;justify-content:center;padding:20px}
.work-modal-box{background:#0a0a1e;border:1px solid var(--border);border-radius:18px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.work-modal-cover{width:100%;height:200px;object-fit:cover;border-radius:18px 18px 0 0;background:#111}
.work-modal-cover-placeholder{width:100%;height:200px;border-radius:18px 18px 0 0;background:linear-gradient(135deg,#1a0a3e,#0a1a3e);display:flex;align-items:center;justify-content:center;font-size:48px}
.work-modal-body{padding:18px 18px 24px}
.work-modal-title{font-size:20px;font-weight:800;margin-bottom:4px}
.work-modal-meta{font-size:12px;color:var(--muted);margin-bottom:14px}
.work-modal-synopsis{font-size:13px;color:rgba(255,255,255,.65);line-height:1.75}
.work-modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:32px;height:32px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── WHY MODAL ── */
.why-modal{position:fixed;inset:0;z-index:60;background:rgba(4,4,15,.88);display:flex;align-items:flex-end}
.why-box{background:#0a0a1e;border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;border-top:1px solid var(--border);max-height:60vh;overflow-y:auto}

/* ── TOOLTIP ── */
#tooltip{position:fixed;background:rgba(8,8,24,.95);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:5px 12px;font-size:12px;font-weight:600;pointer-events:none;z-index:25;white-space:nowrap;transform:translateX(-50%);transition:opacity .1s}

/* ── SECRET TOAST ── */
.secret-toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);z-index:50;background:linear-gradient(135deg,#1a0a3e,#0a1a3e);border:1px solid rgba(123,95,255,.4);border-radius:14px;padding:12px 16px;max-width:300px;width:90%;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
.secret-toast.show{opacity:1}

/* ── STATS ── */
.stats-bar{position:fixed;bottom:0;left:0;right:0;z-index:19;background:linear-gradient(to top,rgba(4,4,15,.85),transparent);padding:7px;display:flex;justify-content:center;gap:24px;pointer-events:none;transition:right .32s}
.stat{font-size:10px;color:var(--muted);text-align:center}
.stat b{display:block;font-size:15px;font-weight:700;color:var(--text)}

/* ── ZOOM ── */
.zoom-ctrl{position:fixed;right:14px;bottom:68px;z-index:20;display:flex;flex-direction:column;gap:4px;transition:right .32s}
.zoom-btn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<script src="data.js" defer></script>

<!-- ── INTRO ── -->
<div class="intro" id="intro" onclick="startApp()">
  <canvas id="intro-canvas"></canvas>
  <div class="intro-text">
    <div class="intro-ad">Ad</div>
    <div class="intro-astra">Astra</div>
    <div class="intro-sub">Un universo de ideas navegable</div>
  </div>
  <div class="intro-hint">toca para explorar</div>
</div>

<!-- ── 3D ── -->
<div id="three-wrap"></div>

<!-- ── HEADER ── -->
<div class="header" id="header" style="display:none">
  <div class="logo">Ad <span>Astra</span></div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="concepto, obra o autor..." autocomplete="off" oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div class="search-results" id="search-results" style="display:none"></div>
  </div>
  <button class="btn-icon" onclick="resetView()">⟳</button>
</div>

<!-- ── MODE BAR ── -->
<div class="mode-bar" id="mode-bar" style="display:none">
  <button class="mode-btn active" id="mode-mapa" onclick="setMode('mapa')">🗺 MAPA</button>
  <button class="mode-btn" id="mode-caminos" onclick="setMode('caminos')">🧭 CAMINOS</button>
  <button class="mode-btn" id="mode-sensaciones" onclick="setMode('sensaciones')">💫 SENSACIÓN</button>
  <button class="mode-btn" id="mode-cronologia" onclick="setMode('cronologia')">📅 ÉPOCA</button>
  <button class="mode-btn" id="mode-perfil" onclick="setMode('perfil')">🧬 PERFIL</button>
</div>

<!-- ── FILTER BAR ── -->
<div class="filter-bar" id="filter-bar" style="display:none"></div>

<!-- ── FULL PANELS ── -->
<div class="full-panel" id="paths-panel"></div>
<div class="full-panel" id="timeline-panel"></div>
<div class="full-panel" id="profile-panel"></div>

<!-- ── NODE PANEL ── -->
<div class="side-panel" id="node-panel">
  <div class="panel-head">
    <span class="panel-head-title" id="panel-head-cat">concepto</span>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-scroll" id="panel-body"></div>
</div>

<!-- ── WORK MODAL ── -->
<div class="work-modal" id="work-modal" style="display:none" onclick="this.style.display='none'">
  <div class="work-modal-box" onclick="event.stopPropagation()" style="position:relative">
    <button class="work-modal-close" onclick="document.getElementById('work-modal').style.display='none'">×</button>
    <div id="work-modal-cover-wrap"></div>
    <div class="work-modal-body">
      <div class="work-badge" id="work-modal-badge" style="margin-bottom:8px"></div>
      <div class="work-modal-title" id="work-modal-title"></div>
      <div class="work-modal-meta" id="work-modal-meta"></div>
      <div class="work-modal-synopsis" id="work-modal-synopsis">Cargando sinopsis...</div>
    </div>
  </div>
</div>

<!-- ── WHY MODAL ── -->
<div class="why-modal" id="why-modal" style="display:none" onclick="this.style.display='none'">
  <div class="why-box" onclick="event.stopPropagation()">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px" id="why-title"></div>
    <div style="font-size:13px;color:rgba(255,255,255,.62);line-height:1.75;margin-bottom:16px" id="why-text"></div>
    <button style="width:100%;padding:10px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:12px" onclick="document.getElementById('why-modal').style.display='none'">cerrar</button>
  </div>
</div>

<!-- ── TOOLTIP ── -->
<div id="tooltip" style="opacity:0;position:fixed;top:0;left:0"></div>

<!-- ── SECRET TOAST ── -->
<div class="secret-toast" id="secret-toast">
  <div style="font-size:11px;font-weight:700;color:#a29bfe;margin-bottom:4px">🔓 Nodo desbloqueado</div>
  <div id="secret-toast-text" style="font-size:11px;color:var(--muted)"></div>
</div>

<!-- ── ZOOM ── -->
<div class="zoom-ctrl" id="zoom-ctrl" style="display:none">
  <button class="zoom-btn" onclick="adjZoom(-120)">+</button>
  <button class="zoom-btn" onclick="adjZoom(120)">−</button>
</div>

<!-- ── STATS ── -->
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat"><b id="stat-nodes">0</b>conceptos</div>
  <div class="stat"><b id="stat-works">0</b>obras</div>
  <div class="stat"><b id="stat-connections">0</b>conexiones</div>
</div>

<script>
// ══════════════════════════════════════════
// CATEGORIES
// ══════════════════════════════════════════
const CATEGORIES={
  tiempo:{ids:['viajes-tiempo','paradojas-temporales','universos-paralelos','realidades-simuladas','suenos-compartidos','mensajes-futuro','ecos-pasado','vidas-anteriores','recuerdos-heredados'],color:'#64c8ff',label:'Tiempo & Realidad'},
  mente:{ids:['inteligencia-artificial','conciencias-digitales','mentes-colmena','singularidad-tecnologica','posthumanismo','inmortalidad','transferencia-mental','memoria','identidad','libre-albedrio','memorias-artificiales','recuerdos-implantados','simulacros-copias','realidad-virtual'],color:'#a29bfe',label:'Mente & Tecnología'},
  contacto:{ids:['contacto-extraterrestre','primer-contacto','civilizaciones-alienígenas','lenguajes-extraterrestres','gran-silencio','bosque-oscuro','hipotesis-zoo','hipotesis-planeta-prohibido','senales-desconocidas'],color:'#00e5c0',label:'Contacto & Silencio'},
  ruinas:{ids:['arqueologia-cosmica','artefactos-alienígenas','ruinas-civilizaciones','civilizaciones-olvidadas','conocimientos-perdidos','mundos-abandonados','planetas-cementerio','ciudades-enterradas','monumentos-extintas','herederos-imperios','ruinas-orbitales','satelites-muertos','especies-desaparecidas','especies-creadoras','mensajes-extintas'],color:'#fd79a8',label:'Ruinas & Memoria'},
  megaescala:{ids:['megaestructuras','mundos-anillo','esferas-dyson','naves-generacionales','colonizacion-espacial','terraformacion','ascensores-espaciales','agujeros-negros','agujeros-gusano','universos-moribundos','fin-universo','energia-estelar','mundos-artificiales'],color:'#f5c518',label:'Megaescala & Cosmos'},
  distopia:{ids:['utopias','distopias','estados-totalitarios','vigilancia-absoluta','corporaciones-omnipotentes','escasez-abundancia','religiones-futuro','mesias-tecnologicos'],color:'#ff7675',label:'Utopía & Distopía'},
  biologia:{ids:['clonacion','ingenieria-genetica','mutacion','evolucion-dirigida','ecologias-alienígenas','oceanos-conscientes','inteligencias-planetarias'],color:'#55efc4',label:'Biología & Evolución'},
  misterio:{ids:['lo-incomprensible','entidades-cosmicas','dioses-alienígenas','falsos-dioses','observadores-invisibles','presencias-desconocidas','habitantes-dimensiones','objetos-lugar','tecnologias-incomprensibles','reliquias-imposibles','naves-fantasma','viajeros-extraviados'],color:'#e17055',label:'Misterio & Horror'},
  finales:{ids:['ultima-pregunta','fin-humanidad','ultimo-hombre','ultima-ciudad','ultima-biblioteca','ultima-nave','ultimos-supervivientes','nostalgia-futuro'],color:'#b2bec3',label:'Finales & Nostalgia'},
  bibliotecas:{ids:['bibliotecas-infinitas','archivos-prohibidos','cartografias-perdidas','mapas-ninguna-parte'],color:'#fdcb6e',label:'Conocimiento & Mapas'},
};
const nodeCatColor={},nodeCatKey={};
Object.entries(CATEGORIES).forEach(([k,{ids,color}])=>ids.forEach(id=>{nodeCatColor[id]=color;nodeCatKey[id]=k;}));

let nodeIds=[],totalWorks=0,totalConns=0;
let activeFilter=null,filterType=null,selectedNodeId=null;

// Profile
const profile=JSON.parse(localStorage.getItem('adastra-profile')||'{}');
const visitedNodes=new Set(JSON.parse(localStorage.getItem('adastra-visited')||'[]'));
function recordVisit(id){
  visitedNodes.add(id);
  const cat=nodeCatKey[id];if(cat)profile[cat]=(profile[cat]||0)+1;
  localStorage.setItem('adastra-profile',JSON.stringify(profile));
  localStorage.setItem('adastra-visited',JSON.stringify([...visitedNodes]));
  checkSecrets();
}
function checkSecrets(){
  Object.values(SECRET_NODES||{}).forEach(sn=>{
    if(visitedNodes.has(sn.id))return;
    if((sn.unlockCondition||[]).every(c=>visitedNodes.has(c))){
      visitedNodes.add(sn.id);
      localStorage.setItem('adastra-visited',JSON.stringify([...visitedNodes]));
      const t=document.getElementById('secret-toast');
      document.getElementById('secret-toast-text').textContent=sn.unlockText||'';
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),5000);
      addSecretNodeToScene(sn.id);
    }
  });
}

// ══════════════════════════════════════════
// INTRO — generative nebula
// ══════════════════════════════════════════
function initIntro(){
  const canvas=document.getElementById('intro-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }

  function initParticles(){
    particles=[];
    // Stars
    for(let i=0;i<300;i++){
      particles.push({type:'star',x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random(),da:(.001+Math.random()*.004)*(Math.random()<.5?1:-1)});
    }
    // Nebula clouds
    for(let i=0;i<6;i++){
      particles.push({type:'cloud',x:W*.3+Math.random()*W*.4,y:H*.2+Math.random()*H*.6,r:80+Math.random()*120,hue:200+Math.random()*160,a:0,da:.002+Math.random()*.003,maxA:.06+Math.random()*.08,dx:(Math.random()-.5)*.1,dy:(Math.random()-.5)*.06});
    }
    // Drifting bright particles
    for(let i=0;i<40;i++){
      particles.push({type:'drift',x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*.8,a:0,da:.003+Math.random()*.004,maxA:.8,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.2});
    }
  }

  let frame=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Deep space gradient
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
    bg.addColorStop(0,'#060618');bg.addColorStop(.6,'#03030f');bg.addColorStop(1,'#020208');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    particles.forEach(p=>{
      if(p.type==='star'){
        p.a+=p.da;if(p.a>1||p.a<0)p.da*=-1;
        ctx.fillStyle=`rgba(255,255,255,${p.a*.6})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      } else if(p.type==='cloud'){
        p.a=Math.min(p.maxA,p.a+p.da);
        p.x+=p.dx;p.y+=p.dy;
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
        g.addColorStop(0,`hsla(${p.hue},80%,60%,${p.a})`);
        g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      } else if(p.type==='drift'){
        p.a=p.a<p.maxA?Math.min(p.maxA,p.a+p.da):p.a-p.da*.5;
        p.x+=p.dx;p.y+=p.dy;
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
        ctx.fillStyle=`rgba(180,160,255,${p.a})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      }
    });
    frame++;
    if(document.getElementById('intro').style.display!=='none') requestAnimationFrame(draw);
  }

  resize();initParticles();draw();
  window.addEventListener('resize',()=>{resize();initParticles();});
}

// ══════════════════════════════════════════
// THREE.JS 3D GRAPH
// ══════════════════════════════════════════
let THREE_LIB,renderer,scene,camera;
let nodeMeshes={},edgeLines={},labelSprites={};
let nodePositions3D={};
let raycaster,mouse3d;
let isPointerDown=false,pointerMoved=false;
let pointerDownX=0,pointerDownY=0;
// Orbit state
let orbitTheta=0,orbitPhi=Math.PI/2,orbitRadius=950;
let targetTheta=0,targetPhi=Math.PI/2,targetRadius=950;
let lastPointerX=0,lastPointerY=0;
let pinchStartDist=0,pinchStartRadius=950;
let autoRotate=true;
let animRunning=false;

function initThree(){
  const T=THREE_LIB;
  const wrap=document.getElementById('three-wrap');

  renderer=new T.WebGLRenderer({antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x04040f,1);
  resizeThree();
  wrap.appendChild(renderer.domElement);

  scene=new T.Scene();
  camera=new T.PerspectiveCamera(55,wrap.clientWidth/wrap.clientHeight,.1,5000);
  camera.position.set(0,0,orbitRadius);

  // Lights
  scene.add(new T.AmbientLight(0xffffff,.7));
  const dl=new T.DirectionalLight(0xffffff,.5);dl.position.set(1,1,1);scene.add(dl);

  // Background stars
  const sg=new T.BufferGeometry();
  const sv=[];for(let i=0;i<4000;i++)sv.push((Math.random()-.5)*5000,(Math.random()-.5)*5000,(Math.random()-.5)*5000);
  sg.setAttribute('position',new T.Float32BufferAttribute(sv,3));
  scene.add(new T.Points(sg,new T.PointsMaterial({color:0xffffff,size:.7,transparent:true,opacity:.5})));

  raycaster=new T.Raycaster();
  raycaster.params.Points.threshold=8;
  mouse3d=new T.Vector2();

  buildGraph();
  attachEvents();
  animRunning=true;
  renderLoop();
}

function resizeThree(){
  if(!renderer)return;
  const panelOpen=document.getElementById('node-panel').classList.contains('open');
  const pw=panelOpen&&window.innerWidth>640?Math.min(400,Math.round(window.innerWidth*.4)):0;
  const W=window.innerWidth-pw,H=window.innerHeight;
  renderer.setSize(W,H);
  if(camera){camera.aspect=W/H;camera.updateProjectionMatrix();}
}

// ── CAMERA ORBIT ─────────────────────────
function updateCamera(){
  const T=THREE_LIB;
  const damp=.08;
  if(autoRotate&&!selectedNodeId) targetTheta+=.004;
  orbitTheta+=(targetTheta-orbitTheta)*damp;
  orbitPhi+=(targetPhi-orbitPhi)*damp;
  orbitRadius+=(targetRadius-orbitRadius)*damp;
  orbitPhi=Math.max(.05,Math.min(Math.PI-.05,orbitPhi));
  camera.position.set(
    orbitRadius*Math.sin(orbitPhi)*Math.sin(orbitTheta),
    orbitRadius*Math.cos(orbitPhi),
    orbitRadius*Math.sin(orbitPhi)*Math.cos(orbitTheta)
  );
  camera.lookAt(0,0,0);
}

function renderLoop(){
  if(!animRunning)return;
  requestAnimationFrame(renderLoop);
  updateCamera();
  // Update label sprites to face camera
  updateLabels();
  renderer.render(scene,camera);
}

// ── LABELS ───────────────────────────────
function makeLabel(text,color){
  const T=THREE_LIB;
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  const fontSize=22;
  ctx.font=`600 ${fontSize}px 'Helvetica Neue',Arial,sans-serif`;
  const tw=ctx.measureText(text).width;
  canvas.width=Math.ceil(tw)+20;canvas.height=fontSize+10;
  ctx.font=`600 ${fontSize}px 'Helvetica Neue',Arial,sans-serif`;
  ctx.fillStyle='rgba(0,0,0,.0)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=8;
  ctx.fillStyle=color||'#ffffff';
  ctx.fillText(text,10,fontSize);
  const tex=new T.CanvasTexture(canvas);
  const mat=new T.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sprite=new T.Sprite(mat);
  const scale=canvas.width/32;
  sprite.scale.set(scale,1,1);
  return sprite;
}

function updateLabels(){
  // Labels always face camera (sprites do this automatically)
  // Fade based on distance
  if(!camera)return;
  const camDist=orbitRadius;
  const showAll=camDist<600;
  Object.entries(labelSprites).forEach(([id,sprite])=>{
    if(!sprite)return;
    const mesh=nodeMeshes[id];
    if(!mesh)return;
    // Show label if close enough or if selected/connected
    const isSelected=selectedNodeId===id;
    const isConnected=selectedNodeId&&(NODES[selectedNodeId]?.connections||[]).includes(id);
    const vis=showAll||isSelected||isConnected;
    sprite.material.opacity=vis?(isSelected?1:isConnected?.85:.55):0;
  });
}

// ── BUILD GRAPH ──────────────────────────
function buildGraph(){
  const T=THREE_LIB;
  const allIds=[...nodeIds,...Object.keys(SECRET_NODES||{}).filter(id=>visitedNodes.has(id))];

  // 3D spherical layout with golden angle
  allIds.forEach((id,i)=>{
    const phi=Math.acos(1-2*(i+.5)/allIds.length);
    const theta=Math.PI*(1+Math.sqrt(5))*i;
    const r=300+Math.random()*60;
    nodePositions3D[id]={x:r*Math.sin(phi)*Math.cos(theta),y:r*Math.sin(phi)*Math.sin(theta),z:r*Math.cos(phi)};
  });

  // Force iterations in 3D
  for(let iter=0;iter<150;iter++){
    const forces={};
    allIds.forEach(id=>{forces[id]={x:0,y:0,z:0};});
    for(let i=0;i<allIds.length;i++){
      for(let j=i+1;j<allIds.length;j++){
        const a=allIds[i],b=allIds[j];
        const pa=nodePositions3D[a],pb=nodePositions3D[b];
        if(!pa||!pb)continue;
        const dx=pb.x-pa.x,dy=pb.y-pa.y,dz=pb.z-pa.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
        const f=20000/(d*d);
        forces[a].x-=dx/d*f;forces[a].y-=dy/d*f;forces[a].z-=dz/d*f;
        forces[b].x+=dx/d*f;forces[b].y+=dy/d*f;forces[b].z+=dz/d*f;
      }
    }
    allIds.forEach(id=>{
      const p=nodePositions3D[id];if(!p)return;
      (NODES[id]?.connections||[]).forEach(cid=>{
        const pc=nodePositions3D[cid];if(!pc)return;
        const dx=pc.x-p.x,dy=pc.y-p.y,dz=pc.z-p.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
        const ideal=200,f=.018*(d-ideal);
        forces[id].x+=dx/d*f;forces[id].y+=dy/d*f;forces[id].z+=dz/d*f;
      });
      forces[id].x-=p.x*.0015;forces[id].y-=p.y*.0015;forces[id].z-=p.z*.0015;
    });
    const damp=iter<80?.35:iter<130?.15:.07;
    allIds.forEach(id=>{
      const p=nodePositions3D[id];if(!p)return;
      p.x+=forces[id].x*damp;p.y+=forces[id].y*damp;p.z+=forces[id].z*damp;
    });
  }

  // Create meshes
  allIds.forEach(id=>createNodeMesh(id));

  // Create edges
  allIds.forEach(id=>{
    (NODES[id]?.connections||[]).forEach(cid=>{
      if(!nodePositions3D[cid]||cid<id)return;
      const key=[id,cid].sort().join('||');
      const pts=[
        new T.Vector3(nodePositions3D[id].x,nodePositions3D[id].y,nodePositions3D[id].z),
        new T.Vector3(nodePositions3D[cid].x,nodePositions3D[cid].y,nodePositions3D[cid].z)
      ];
      const geo=new T.BufferGeometry().setFromPoints(pts);
      const mat=new T.LineBasicMaterial({color:0x223344,transparent:true,opacity:.2});
      const line=new T.Line(geo,mat);
      line.userData={id1:id,id2:cid};
      scene.add(line);
      edgeLines[key]=line;
    });
  });
}

function createNodeMesh(id){
  const T=THREE_LIB;
  const p=nodePositions3D[id];if(!p)return;
  const col=nodeCatColor[id]||'#7b5fff';
  const isSecret=!!(SECRET_NODES||{})[id];
  const size=5+(NODES[id]?.connections?.length||0)*.5;
  const geo=new T.SphereGeometry(size,14,14);
  const mat=new T.MeshPhongMaterial({
    color:new T.Color(col),emissive:new T.Color(col),emissiveIntensity:.25,
    transparent:isSecret,opacity:isSecret?.75:1,wireframe:isSecret
  });
  const mesh=new T.Mesh(geo,mat);
  mesh.position.set(p.x,p.y,p.z);
  mesh.userData.nodeId=id;
  scene.add(mesh);
  nodeMeshes[id]=mesh;

  // Label sprite
  const sprite=makeLabel(NODES[id]?.label||id,col);
  sprite.position.set(p.x,p.y+size+8,p.z);
  sprite.material.opacity=0;
  scene.add(sprite);
  labelSprites[id]=sprite;
}

function addSecretNodeToScene(id){
  if(!nodePositions3D[id]){
    nodePositions3D[id]={x:(Math.random()-.5)*300,y:(Math.random()-.5)*300,z:(Math.random()-.5)*300};
  }
  createNodeMesh(id);
}

// ── EVENTS ───────────────────────────────
function attachEvents(){
  const el=renderer.domElement;

  // Mouse
  el.addEventListener('mousedown',e=>{
    isPointerDown=true;pointerMoved=false;
    lastPointerX=e.clientX;lastPointerY=e.clientY;
    pointerDownX=e.clientX;pointerDownY=e.clientY;
    autoRotate=false;
  });
  el.addEventListener('mousemove',e=>{
    if(isPointerDown){
      const dx=e.clientX-lastPointerX,dy=e.clientY-lastPointerY;
      if(Math.abs(e.clientX-pointerDownX)>4||Math.abs(e.clientY-pointerDownY)>4) pointerMoved=true;
      targetTheta-=dx*.005;
      targetPhi=Math.max(.05,Math.min(Math.PI-.05,targetPhi+dy*.005));
      lastPointerX=e.clientX;lastPointerY=e.clientY;
    } else {
      handleHover(e.clientX,e.clientY);
    }
  });
  el.addEventListener('mouseup',e=>{
    if(!pointerMoved) handleClick(e.clientX,e.clientY);
    isPointerDown=false;
  });
  el.addEventListener('wheel',e=>{
    e.preventDefault();
    targetRadius=Math.max(200,Math.min(2200,targetRadius+e.deltaY*.9));
  },{passive:false});

  // Touch
  el.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      isPointerDown=true;pointerMoved=false;
      lastPointerX=e.touches[0].clientX;lastPointerY=e.touches[0].clientY;
      pointerDownX=lastPointerX;pointerDownY=lastPointerY;
      autoRotate=false;
    } else if(e.touches.length===2){
      isPointerDown=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchStartDist=Math.sqrt(dx*dx+dy*dy);
      pinchStartRadius=targetRadius;
    }
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&isPointerDown){
      const dx=e.touches[0].clientX-lastPointerX,dy=e.touches[0].clientY-lastPointerY;
      if(Math.abs(dx)>4||Math.abs(dy)>4) pointerMoved=true;
      targetTheta-=dx*.005;
      targetPhi=Math.max(.05,Math.min(Math.PI-.05,targetPhi+dy*.005));
      lastPointerX=e.touches[0].clientX;lastPointerY=e.touches[0].clientY;
    } else if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      targetRadius=Math.max(200,Math.min(2200,pinchStartRadius*(pinchStartDist/dist)));
    }
  },{passive:false});
  el.addEventListener('touchend',e=>{
    if(!pointerMoved&&e.changedTouches.length>0){
      handleClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    }
    isPointerDown=false;
  },{passive:true});

  window.addEventListener('resize',resizeThree);
}

function getHit(clientX,clientY){
  const T=THREE_LIB;
  const rect=renderer.domElement.getBoundingClientRect();
  mouse3d.x=((clientX-rect.left)/rect.width)*2-1;
  mouse3d.y=-((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse3d,camera);
  const meshList=Object.values(nodeMeshes);
  const hits=raycaster.intersectObjects(meshList);
  return hits.length>0?hits[0].object.userData.nodeId:null;
}

function handleHover(cx,cy){
  const id=getHit(cx,cy);
  const tip=document.getElementById('tooltip');
  if(id&&NODES[id]){
    renderer.domElement.style.cursor='pointer';
    tip.textContent=NODES[id].label;
    tip.style.left=cx+'px';
    tip.style.top=(cy-38)+'px';
    tip.style.opacity='1';
  } else {
    renderer.domElement.style.cursor='grab';
    tip.style.opacity='0';
  }
}

function handleClick(cx,cy){
  const id=getHit(cx,cy);
  document.getElementById('tooltip').style.opacity='0';
  if(id) openNode(id);
  else closePanel();
}

// ── HIGHLIGHT ────────────────────────────
function highlightNode(id){
  const T=THREE_LIB;
  Object.entries(nodeMeshes).forEach(([nid,mesh])=>{
    const col=nodeCatColor[nid]||'#7b5fff';
    mesh.material.color.set(col);
    mesh.material.emissive.set(col);
    mesh.material.emissiveIntensity=.25;
    mesh.scale.setScalar(1);
    mesh.material.opacity=mesh.material.transparent?.75:1;
  });
  Object.values(edgeLines).forEach(l=>{l.material.color.set(0x223344);l.material.opacity=.2;});

  if(!id)return;

  const selMesh=nodeMeshes[id];
  if(selMesh){selMesh.material.emissiveIntensity=1.2;selMesh.scale.setScalar(1.5);}

  const connIds=NODES[id]?.connections||[];
  connIds.forEach(cid=>{
    const cm=nodeMeshes[cid];
    if(cm){cm.material.emissiveIntensity=.7;cm.scale.setScalar(1.2);}
    const key=[id,cid].sort().join('||');
    const line=edgeLines[key];
    if(line){line.material.color.set(nodeCatColor[id]||'#7b5fff');line.material.opacity=.8;}
  });

  // Dim unrelated
  Object.keys(nodeMeshes).forEach(nid=>{
    if(nid!==id&&!connIds.includes(nid)){
      nodeMeshes[nid].material.emissiveIntensity=.04;
    }
  });

  // Fly toward node
  const p=nodePositions3D[id];
  if(p){
    const len=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z)||1;
    const phi=Math.acos(Math.max(-1,Math.min(1,p.y/len)));
    const theta=Math.atan2(p.x,p.z);
    targetTheta=theta;targetPhi=phi;targetRadius=600;
  }
}

// ══════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════
const TYPE_L={libro:'📖 Libro',pelicula:'🎬 Película',serie:'📺 Serie',comic:'📓 Cómic',videojuego:'🎮 Videojuego'};
const TYPE_B={libro:'badge-libro',pelicula:'badge-pelicula',serie:'badge-serie',comic:'badge-comic',videojuego:'badge-videojuego'};

function openNode(id){
  selectedNodeId=id;
  autoRotate=false;
  recordVisit(id);
  highlightNode(id);
  const node=NODES[id];if(!node)return;
  const col=nodeCatColor[id]||'#7b5fff';
  const catLabel=nodeCatKey[id]?CATEGORIES[nodeCatKey[id]]?.label:((SECRET_NODES||{})[id]?'✦ Nodo secreto':'Concepto');
  const dnaEntries=Object.entries(WORK_DNA||{}).filter(([_,d])=>d.dna.some(e=>e.node===id));

  document.getElementById('panel-head-cat').textContent=catLabel;

    <span class="panel-cat-badge" style="color:${col};border-color:${col}33;background:${col}11">${catLabel}</span>

    <div class="panel-desc">${node.desc}</div>

    <div class="section-label">conexiones · ${(node.connections||[]).filter(c=>NODES[c]).length}</div>
    <div class="conn-list">
      ${(node.connections||[]).filter(c=>NODES[c]).map(cid=>{
        const key=[id,cid].sort().join('||');
        const hasWhy=!!(EDGE_REASONS||{})[key];
        return `<span class="conn-chip" style="border-color:${nodeCatColor[cid]||'#fff'}44;color:${nodeCatColor[cid]||'#fff'}" onclick="openNode('${cid}')">${NODES[cid].label}</span>${hasWhy?`<span class="conn-why" onclick="showWhy('${id}','${cid}')">¿por qué?</span>`:''}`;
      }).join('')}
    </div>

    ${dnaEntries.length?`
    <div class="section-label">peso en obras</div>
    ${dnaEntries.slice(0,4).map(([title,d])=>{
      const e=d.dna.find(x=>x.node===id);
      return `<div class="dna-row">
        <div style="font-size:10px;color:var(--muted);margin-bottom:1px;cursor:pointer" onclick="openWorkModal('${title.replace(/'/g,"\\'")}','${d.type||''}','${d.author||''}')">${title}</div>
        <div class="dna-track"><div class="dna-fill" style="width:${e.pct}%;background:${col}"></div></div>
      </div>`;
    }).join('')}`:''}

    <div class="section-label">obras · ${node.works.length}</div>
    <div class="works-list">
      ${node.works.map(w=>`
        <div class="work-card" onclick="openWorkModal('${w.title.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${w.type}','${(w.author||'').replace(/'/g,"\\'")}')">
          <span class="work-badge ${TYPE_B[w.type]||'badge-libro'}">${TYPE_L[w.type]||w.type}</span>

            <div class="work-author-text" onclick="event.stopPropagation();openAuthorModal('${(w.author||'').replace(/'/g,"\\'")}','${w.type}')">${w.author}</div>
          </div>
        </div>`).join('')}
    </div>`;

  const panel=document.getElementById('node-panel');
  panel.classList.add('open');
  shiftUI(true);
}

function closePanel(){
  selectedNodeId=null;
  highlightNode(null);
  document.getElementById('node-panel').classList.remove('open');
  shiftUI(false);
}

function shiftUI(open){
  const pw=open&&window.innerWidth>640?Math.min(400,Math.round(window.innerWidth*.4)):0;
  const v=pw?pw+'px':'0';
  document.getElementById('three-wrap').style.right=v;
  document.getElementById('header').style.right=v;
  document.getElementById('mode-bar').style.right=v;
  document.getElementById('filter-bar').style.right=v;
  document.getElementById('zoom-ctrl').style.right=open?(pw+14)+'px':'14px';
  document.getElementById('stats-bar').style.right=v;
  setTimeout(resizeThree,340);
}

// ── WHY ──────────────────────────────────
function showWhy(id1,id2){
  const key=[id1,id2].sort().join('||');
  const reason=(EDGE_REASONS||{})[key];if(!reason)return;
  document.getElementById('why-title').textContent=`${NODES[id1].label} ↔ ${NODES[id2].label}`;
  document.getElementById('why-text').textContent=reason;
  document.getElementById('why-modal').style.display='flex';
}

// ── WORK MODAL ───────────────────────────
const TMDB_KEY='422113b59d8c9a7a5b8c7345ad4c4e6c';
const TYPE_EMOJI={libro:'📖',pelicula:'🎬',serie:'📺',comic:'📓',videojuego:'🎮'};

async function openWorkModal(title,type,author){
  const modal=document.getElementById('work-modal');
  const coverWrap=document.getElementById('work-modal-cover-wrap');
  const badge=document.getElementById('work-modal-badge');
  const titleEl=document.getElementById('work-modal-title');
  const metaEl=document.getElementById('work-modal-meta');
  const synopsis=document.getElementById('work-modal-synopsis');
  const dna=(WORK_DNA||{})[title];

  badge.textContent=(TYPE_L[type]||type||'Obra');
  badge.className='work-badge '+(TYPE_B[type]||'badge-libro');
  badge.style.marginBottom='8px';
  titleEl.textContent=title;
  metaEl.textContent=author||'';
  synopsis.textContent='Cargando...';
  coverWrap.innerHTML=`<div class="work-modal-cover-placeholder">${TYPE_EMOJI[type]||'📖'}</div>`;
  modal.style.display='flex';

  // DNA section
  if(dna){
    synopsis.innerHTML=`<div style="margin-bottom:14px">
      ${dna.dna.map(e=>`<div style="margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
          <span style="cursor:pointer;color:${nodeCatColor[e.node]||'#fff'}" onclick="openNode('${e.node}');document.getElementById('work-modal').style.display='none'">${NODES[e.node]?.label||e.node}</span>
          <span style="color:var(--muted)">${e.pct}%</span>
        </div>
        <div class="dna-track"><div class="dna-fill" style="width:${e.pct}%;background:${nodeCatColor[e.node]||'#7b5fff'}"></div></div>
      </div>`).join('')}
    </div><div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px" id="synopsis-text">Cargando sinopsis...</div>`;
  }

  // Fetch cover + synopsis
  try{
    if(type==='pelicula'||type==='serie'){
      const searchType=type==='serie'?'tv':'movie';
      const r=await fetch(`https://api.themoviedb.org/3/search/${searchType}?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=es-ES`);
      const d=await r.json();
      const item=d.results?.[0];
      if(item){
        if(item.poster_path) coverWrap.innerHTML=`<img class="work-modal-cover" src="https://image.tmdb.org/t/p/w500${item.poster_path}" onerror="this.parentNode.innerHTML='<div class=\\'work-modal-cover-placeholder\\'>${TYPE_EMOJI[type]||'🎬'}</div>'">`;
        const syn=item.overview||'';
        const target=dna?document.getElementById('synopsis-text'):synopsis;
        if(target)target.textContent=syn||'Sinopsis no disponible.';
      }
    } else {
      // Wikipedia for books/other
      const wikiTitle=encodeURIComponent(title);
      const r=await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${wikiTitle}`);
      if(r.ok){
        const d=await r.json();
        if(d.thumbnail?.source) coverWrap.innerHTML=`<img class="work-modal-cover" src="${d.thumbnail.source}" style="object-position:top" onerror="this.parentNode.innerHTML='<div class=\\'work-modal-cover-placeholder\\'>${TYPE_EMOJI[type]||'📖'}</div>'">`;
        const target=dna?document.getElementById('synopsis-text'):synopsis;
        if(target)target.textContent=d.extract||'Sinopsis no disponible.';
      } else {
        // Try English Wikipedia
        const re=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wikiTitle}`);
        if(re.ok){
          const de=await re.json();
          // Translate with MyMemory
          if(de.extract){
            const tr=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(de.extract.slice(0,400))}&langpair=en|es`);
            const td=await tr.json();
            const target=dna?document.getElementById('synopsis-text'):synopsis;
            if(target)target.textContent=td.responseData?.translatedText||de.extract||'Sinopsis no disponible.';
          }
          if(de.thumbnail?.source) coverWrap.innerHTML=`<img class="work-modal-cover" src="${de.thumbnail.source}" style="object-position:top" onerror="this.parentNode.innerHTML='<div class=\\'work-modal-cover-placeholder\\'>${TYPE_EMOJI[type]||'📖'}</div>'">`;
        }
      }
    }
  }catch(e){
    const target=dna?document.getElementById('synopsis-text'):synopsis;
    if(target)target.textContent='No se pudo cargar la sinopsis.';
  }
}

// ── AUTHOR MODAL ─────────────────────────
async function openAuthorModal(author,workType){
  if(!author)return;
  const modal=document.getElementById('work-modal');
  const coverWrap=document.getElementById('work-modal-cover-wrap');
  const badge=document.getElementById('work-modal-badge');
  const titleEl=document.getElementById('work-modal-title');
  const metaEl=document.getElementById('work-modal-meta');
  const synopsis=document.getElementById('work-modal-synopsis');

  badge.textContent='✍️ Autor';badge.className='work-badge badge-libro';badge.style.marginBottom='8px';
  titleEl.textContent=author;metaEl.textContent='';
  synopsis.textContent='Cargando biografía...';
  coverWrap.innerHTML=`<div class="work-modal-cover-placeholder">✍️</div>`;
  modal.style.display='flex';

  // Find all works by this author in catalog
  const authorWorks=[];
  nodeIds.forEach(id=>{
    (NODES[id]?.works||[]).forEach(w=>{
      if(w.author===author&&!authorWorks.find(x=>x.title===w.title)) authorWorks.push(w);
    });
  });
  if(authorWorks.length>0){
    synopsis.innerHTML=`<div id="bio-text">Cargando biografía...</div>
      <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">
        <div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Obras en el mapa</div>
        ${authorWorks.map(w=>`<div class="work-card" style="margin-bottom:6px" onclick="openWorkModal('${w.title.replace(/'/g,"\\'")}','${w.type}','${author.replace(/'/g,"\\'")}')">
          <span class="work-badge ${TYPE_B[w.type]||'badge-libro'}">${TYPE_L[w.type]||w.type}</span>
          <div class="work-info"><div class="work-title-text">${w.title}</div></div>
        </div>`).join('')}
      </div>`;
  }

  try{
    const r=await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(author)}`);
    if(r.ok){
      const d=await r.json();
      if(d.thumbnail?.source) coverWrap.innerHTML=`<img class="work-modal-cover" src="${d.thumbnail.source}" style="object-position:top">`;
      const target=document.getElementById('bio-text')||synopsis;
      if(target)target.textContent=d.extract||'Biografía no disponible.';
    } else {
      const re=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(author)}`);
      if(re.ok){
        const de=await re.json();
        if(de.extract){
          const tr=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(de.extract.slice(0,400))}&langpair=en|es`);
          const td=await tr.json();
          const target=document.getElementById('bio-text')||synopsis;
          if(target)target.textContent=td.responseData?.translatedText||de.extract;
        }
        if(de.thumbnail?.source) coverWrap.innerHTML=`<img class="work-modal-cover" src="${de.thumbnail.source}" style="object-position:top">`;
      }
    }
  }catch(e){
    const target=document.getElementById('bio-text')||synopsis;
    if(target)target.textContent='No se pudo cargar la biografía.';
  }
}

// ══════════════════════════════════════════
// MODES & FILTERS
// ══════════════════════════════════════════
function applyFilter(){
  Object.entries(nodeMeshes).forEach(([id,mesh])=>{
    let vis=true;
    if(activeFilter){
      if(filterType==='cat')vis=nodeCatKey[id]===activeFilter;
      else if(filterType==='sensation')vis=(SENSATIONS[activeFilter]?.nodes||[]).includes(id);
      else if(filterType==='path'){const p=(PATHS||[]).find(x=>x.id===activeFilter);vis=p?p.nodes.includes(id):true;}
    }
    mesh.material.opacity=vis?1:.04;
    mesh.material.transparent=!vis||!!(SECRET_NODES||{})[id];
  });
  Object.values(edgeLines).forEach(l=>{
    const va=nodeMeshes[l.userData.id1]?.material.opacity>.1;
    const vb=nodeMeshes[l.userData.id2]?.material.opacity>.1;
    l.material.opacity=(va&&vb)?.2:.02;
  });
}

function setMode(mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode)?.classList.add('active');
  document.querySelectorAll('.full-panel').forEach(p=>p.style.display='none');
  document.getElementById('filter-bar').style.display='none';
  if(mode==='mapa'){activeFilter=null;filterType=null;buildFilterBar('cat');document.getElementById('filter-bar').style.display='flex';applyFilter();}
  else if(mode==='caminos'){buildPathsPanel();document.getElementById('paths-panel').style.display='block';}
  else if(mode==='sensaciones'){activeFilter=null;filterType=null;buildFilterBar('sensation');document.getElementById('filter-bar').style.display='flex';applyFilter();}
  else if(mode==='cronologia'){buildTimeline();document.getElementById('timeline-panel').style.display='block';}
  else if(mode==='perfil'){buildProfile();document.getElementById('profile-panel').style.display='block';}
}

function buildFilterBar(type){
  const bar=document.getElementById('filter-bar');
  const items=type==='cat'?[['null','todo',{color:'#7b5fff'}],...Object.entries(CATEGORIES).map(([k,v])=>[k,v.label,v])]:
    [['null','todo',{color:'#7b5fff'}],...Object.entries(SENSATIONS||{}).map(([k,v])=>[k,`${v.emoji} ${v.label}`,v])];
  bar.innerHTML=items.map(([k,label,{color}])=>`<span class="fchip${(!activeFilter&&k==='null')||activeFilter===k?' active':''}" id="fc-${k}" style="--chip-color:${color}" onclick="setFilter('${k}','${type}')"><span class="dot" style="background:${color}"></span>${label}</span>`).join('');
}

function setFilter(key,type){
  activeFilter=key==='null'?null:key;filterType=activeFilter?type:null;
  closePanel();
  document.querySelectorAll('.fchip').forEach(e=>e.classList.remove('active'));
  document.getElementById('fc-'+key)?.classList.add('active');
  applyFilter();
}

function buildPathsPanel(){
  document.getElementById('paths-panel').innerHTML=
    `<div style="font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase">Itinerarios temáticos</div>`+
    (PATHS||[]).map(p=>`<div class="path-card" style="border-color:${p.color}33" onclick="startPath('${p.id}')">
      <div style="font-size:14px;font-weight:700;color:${p.color};margin-bottom:4px">${p.emoji} ${p.title}</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px">${p.desc}</div>
      <div class="path-nodes">${p.nodes.filter(id=>NODES[id]).map(id=>`<span class="path-node-chip" style="border-color:${nodeCatColor[id]}44;color:${nodeCatColor[id]}">${NODES[id].label}</span>`).join('')}</div>
    </div>`).join('');
}

function startPath(pathId){
  const path=(PATHS||[]).find(p=>p.id===pathId);if(!path)return;
  setMode('mapa');activeFilter=pathId;filterType='path';applyFilter();
  const firstId=path.nodes.find(id=>nodeMeshes[id]);
  if(firstId)setTimeout(()=>openNode(firstId),200);
}

function buildTimeline(){
  document.getElementById('timeline-panel').innerHTML=
    `<div style="font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase">Evolución histórica</div>`+
    (TIMELINE||[]).map(era=>`<div class="tl-era" style="--tl-color:${era.color}"><div class="tl-dot"></div><div class="tl-label">${era.label}</div><div class="tl-note">${era.note}</div><div class="tl-nodes">${era.nodes.filter(id=>NODES[id]).map(id=>`<span class="tl-chip" onclick="goToNode('${id}')">${NODES[id].label}</span>`).join('')}</div></div>`).join('');
}

function buildProfile(){
  const total=Object.values(profile).reduce((a,b)=>a+b,0)||1;
  const sorted=Object.entries(profile).sort((a,b)=>b[1]-a[1]);
  const secCount=Object.keys(SECRET_NODES||{}).filter(id=>visitedNodes.has(id)).length;
  if(!visitedNodes.size){
    document.getElementById('profile-panel').innerHTML=`<div style="text-align:center;padding:3rem;color:var(--muted)"><div style="font-size:36px;margin-bottom:12px">🧬</div><div>Tu perfil se construye mientras exploras.</div></div>`;
    return;
  }
  document.getElementById('profile-panel').innerHTML=
    `<div style="font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase">Tu ADN de lector</div>
    <div style="display:flex;gap:16px;margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:12px;padding:12px;border:1px solid var(--border)">
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:800">${visitedNodes.size}</div><div style="font-size:10px;color:var(--muted)">visitados</div></div>
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:800;color:#a29bfe">${secCount}</div><div style="font-size:10px;color:var(--muted)">secretos</div></div>
    </div>
    ${sorted.map(([cat,count])=>{const pct=Math.round(count/total*100);const{color,label}=CATEGORIES[cat]||{color:'#7b5fff',label:cat};return`<div class="profile-bar"><div class="profile-bar-label"><span>${label}</span><span style="color:var(--muted)">${pct}%</span></div><div class="profile-bar-track"><div class="profile-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;}).join('')}`;
}

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
function onSearch(q){
  const res=document.getElementById('search-results');
  if(!q.trim()){res.style.display='none';return;}
  const ql=q.toLowerCase();
  const nodeMatches=nodeIds.filter(id=>NODES[id].label.toLowerCase().includes(ql)).slice(0,4);
  const workMatches=[];
  nodeIds.forEach(id=>(NODES[id].works||[]).forEach(w=>{if(w.title.toLowerCase().includes(ql)&&workMatches.length<3)workMatches.push({w,id});}));
  if(!nodeMatches.length&&!workMatches.length){res.style.display='none';return;}
  res.style.display='block';
  res.innerHTML=
    nodeMatches.map(id=>`<div class="search-result" onclick="goToNode('${id}')"><span style="color:${nodeCatColor[id]};font-size:10px">●</span> <b>${NODES[id].label}</b></div>`).join('')+
    workMatches.map(({w,id})=>`<div class="search-result" onclick="openWorkModal('${w.title.replace(/'/g,"\\'")}','${w.type}','${(w.author||'').replace(/'/g,"\\'")}')"><span style="font-size:10px">${TYPE_EMOJI[w.type]||'📖'}</span> ${w.title}</div>`).join('');
}
function goToNode(id){
  document.getElementById('search-input').value='';document.getElementById('search-results').style.display='none';
  openNode(id);
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))document.getElementById('search-results').style.display='none';});

function adjZoom(delta){targetRadius=Math.max(200,Math.min(2200,targetRadius+delta));}
function resetView(){closePanel();activeFilter=null;filterType=null;targetRadius=950;targetTheta=0;targetPhi=Math.PI/2;autoRotate=true;applyFilter();buildFilterBar('cat');}

// START
// ══════════════════════════════════════════
function startApp(){
  document.getElementById('intro').style.display='none';
  ['header','mode-bar','filter-bar','zoom-ctrl','stats-bar'].forEach(id=>{document.getElementById(id).style.display=id==='mode-bar'?'flex':id==='stats-bar'?'flex':id==='zoom-ctrl'?'flex':id==='filter-bar'?'flex':'flex';});
  document.getElementById('stat-nodes').textContent=nodeIds.length;
  document.getElementById('stat-works').textContent=totalWorks;
  document.getElementById('stat-connections').textContent=totalConns;
  buildFilterBar('cat');
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
window.addEventListener('load',function(){
  if(typeof NODES==='undefined'){
    document.querySelector('.intro-sub').textContent='Error al cargar. Recarga la página.';return;
  }

  // Init data
  nodeIds=Object.keys(NODES);
  nodeIds.forEach(id=>{
    if(!nodeCatColor[id])nodeCatColor[id]='#7b5fff';
    totalWorks+=(NODES[id]?.works?.length||0);
    totalConns+=(NODES[id]?.connections?.length||0);
  });
  totalConns=Math.round(totalConns/2);
  document.getElementById('i-nodes').textContent=nodeIds.length;
  document.getElementById('i-works').textContent=totalWorks;
  document.getElementById('i-conns').textContent=totalConns;

  // Intro
  initIntro();

  // Load Three.js
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js';
  s.onload=()=>{THREE_LIB=window.THREE;initThree();};
  document.head.appendChild(s);

  // SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations()
      .then(regs=>{regs.forEach(r=>r.unregister());})
      .then(()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
  }
});
</script>
