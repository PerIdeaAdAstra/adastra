<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04040f">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
<title>Ad Astra</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#04040f;--s1:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);--text:#e8e6f0;--muted:rgba(255,255,255,.4);--accent:#7b5fff;--accent2:#00e5c0;--gold:#f5c518;--font:'Helvetica Neue',Arial,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#label-overlay{position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.nlabel{position:absolute;transform:translate(-50%,-100%);font-size:11px;font-weight:600;color:#fff;text-shadow:0 0 8px rgba(0,0,0,1),0 0 4px rgba(0,0,0,1);white-space:nowrap;pointer-events:none;transition:opacity .2s}
/* LEGEND */
#legend{position:fixed;left:12px;bottom:66px;z-index:19;transition:left .32s;background:rgba(4,4,15,.75);padding:8px 10px;border-radius:10px;border:1px solid var(--border);backdrop-filter:blur(4px)}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,255,255,.45);margin-bottom:3px;cursor:pointer;transition:color .15s;white-space:nowrap}
.leg-item:last-child{margin-bottom:0}
.leg-item:hover{color:rgba(255,255,255,.9)}
.leg-item.on{color:#fff;font-weight:600}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}


/* INTRO */
.intro{position:fixed;inset:0;z-index:50;overflow:hidden;cursor:pointer}
#intro-canvas{position:absolute;inset:0;width:100%;height:100%}
.intro-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.intro-ad{font-size:clamp(16px,3.5vw,24px);font-weight:300;letter-spacing:clamp(10px,4vw,24px);color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:6px;animation:fi 2s ease both}
.intro-astra{font-size:clamp(64px,16vw,140px);font-weight:800;letter-spacing:-3px;line-height:1;background:linear-gradient(135deg,#fff 0%,#a29bfe 45%,#00e5c0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fi 2s ease .3s both}
.intro-line{font-size:clamp(10px,1.8vw,13px);color:rgba(255,255,255,.18);letter-spacing:5px;text-transform:uppercase;margin-top:22px;animation:fi 2s ease .8s both}
.intro-tap{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.15);letter-spacing:3px;text-transform:uppercase;animation:pulse 2.5s ease-in-out infinite}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.15}50%{opacity:.45}}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(to bottom,rgba(4,4,15,.97),rgba(4,4,15,.3));transition:right .32s}
.logo{font-size:13px;font-weight:800;white-space:nowrap}
.logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sbox{flex:1;position:relative;min-width:0}
.sinput{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 28px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.35;pointer-events:none}
.sresults{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#0c0c1e;border:1px solid var(--border);border-radius:12px;z-index:40;max-height:240px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.8)}
.sitem{padding:9px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.sitem:hover{background:rgba(123,95,255,.15)}
.sitem:last-child{border-bottom:none}
.ibtn{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mmbtn.active{background:rgba(123,95,255,.25);border-color:var(--accent);color:var(--text)}
.mmbtn:hover{background:rgba(255,255,255,.12)}

/* MODE BAR */
.mbar{position:fixed;top:48px;left:0;right:0;z-index:18;display:flex;background:rgba(4,4,15,.93);border-bottom:1px solid var(--border);transition:right .32s;overflow-x:auto;scrollbar-width:none}
.mbar::-webkit-scrollbar{display:none}
.mbtn{flex:1;min-width:60px;padding:7px 2px;font-size:9px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font);letter-spacing:.3px;border-bottom:2px solid transparent;white-space:nowrap}
.mbtn.active{color:var(--text);border-bottom-color:var(--accent)}

/* FILTER BAR */
.fbar{position:fixed;top:86px;left:0;right:0;z-index:17;display:flex;flex-direction:column;gap:0;padding:5px 10px;overflow:hidden;background:linear-gradient(to bottom,rgba(4,4,15,.88),rgba(4,4,15,.5));transition:right .32s}
.fbar>div{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:3px 0}
.fbar>div::-webkit-scrollbar{display:none}
.fchip{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:10px;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.fchip.on{color:#fff;border-color:var(--cc);background:rgba(255,255,255,.06)}
.fchip .dot{width:6px;height:6px;border-radius:50%;background:var(--cc);flex-shrink:0}

/* SIDE PANEL */
.spanel{position:fixed;top:0;right:0;bottom:0;width:min(420px,42vw);z-index:30;background:#05050e;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.spanel.open{transform:translateX(0)}
.sp-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;background:#05050e;border-bottom:1px solid var(--border);z-index:1;flex-shrink:0}
.sp-cat{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.7px;text-transform:uppercase}
.sp-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px}
.sp-body{overflow-y:auto;flex:1;padding:12px 14px 40px}
@media(max-width:680px){
  .spanel{top:auto;right:0;left:0;width:100%;height:64vh;border-left:none;border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%)}
  .spanel.open{transform:translateY(0)}
}

/* PANEL CONTENT */
.pcbadge{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 9px;border-radius:20px;border:1px solid;display:inline-block;margin-bottom:8px}
.ptitle{font-size:19px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;line-height:1.2}
.pdesc{font-size:13px;color:rgba(255,255,255,.58);line-height:1.75;margin-bottom:4px}
.psec{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
.clist{display:flex;flex-wrap:wrap;gap:5px}
.cchip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);transition:background .15s}
.cchip:hover{background:rgba(255,255,255,.1)}
.cwhy{font-size:10px;color:var(--accent2);cursor:pointer;margin-left:3px;opacity:.9;background:rgba(0,229,192,.1);padding:2px 7px;border-radius:10px;border:1px solid rgba(0,229,192,.2);white-space:nowrap}
.wlist{display:flex;flex-direction:column;gap:6px}
.wcard{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--s1);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:background .15s}
.wcard:hover{background:rgba(255,255,255,.08)}
.wbadge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.bl{background:rgba(0,229,192,.1);color:var(--accent2)}
.bp{background:rgba(123,95,255,.1);color:var(--accent)}
.bs{background:rgba(245,197,24,.1);color:var(--gold)}
.bc{background:rgba(255,92,122,.1);color:#ff5c7a}
.bv{background:rgba(100,200,100,.1);color:#64c864}
.winfo{flex:1;min-width:0}
.wt{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wa{font-size:11px;color:var(--muted);cursor:pointer}
.wa:hover{color:var(--accent2);text-decoration:underline}
.drow{margin:3px 0}
.dtrack{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-top:2px}
.dfill{height:100%;border-radius:3px}

/* FULL PANELS */
.fpanel{position:fixed;top:120px;left:0;right:0;bottom:52px;z-index:15;overflow-y:auto;padding:10px 14px;display:none;background:rgba(4,4,15,.97);backdrop-filter:blur(8px)}
.pcard{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.pcard:hover{background:rgba(255,255,255,.07)}
.pnodes{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.pnchip{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55)}
.tlera{margin-bottom:16px;padding-left:20px;position:relative}
.tlera::before{content:'';position:absolute;left:6px;top:8px;bottom:-8px;width:2px;background:var(--tc,#7b5fff);opacity:.35}
.tldot{position:absolute;left:0;top:6px;width:13px;height:13px;border-radius:50%;background:var(--tc);border:2px solid var(--bg)}
.tllabel{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--tc);text-transform:uppercase;margin-bottom:4px}
.tlnote{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:7px}
.tlnodes{display:flex;flex-wrap:wrap;gap:4px}
.tlchip{font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;color:var(--text)}
.tlchip:hover{background:rgba(255,255,255,.1)}
.prbar{margin-bottom:10px}
.prbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.prbt{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.prbf{height:100%;border-radius:4px}

/* LAB */
.lab-node{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid;background:rgba(255,255,255,.05);margin:3px;cursor:default;font-size:12px}
.lab-node .rm{cursor:pointer;opacity:.5;margin-left:2px;font-size:14px}
.lab-node .rm:hover{opacity:1}
.lab-result{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.lab-result:hover{background:rgba(255,255,255,.07)}
.lab-pct{font-size:18px;font-weight:800;margin-bottom:2px}
.lab-hyp{background:linear-gradient(135deg,rgba(123,95,255,.1),rgba(0,229,192,.08));border:1px solid rgba(123,95,255,.25);border-radius:14px;padding:16px;margin-top:12px}

/* WORK MODAL */
.wmodal{position:fixed;inset:0;z-index:60;background:rgba(4,4,15,.88);display:flex;align-items:center;justify-content:center;padding:16px}
.wmodalbox{background:#08081a;border:1px solid var(--border);border-radius:18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;position:relative}
.wmcover{width:100%;height:220px;object-fit:cover;border-radius:18px 18px 0 0;background:#111;display:block}
.wmph{width:100%;height:220px;border-radius:18px 18px 0 0;background:linear-gradient(135deg,#12083a,#081228);display:flex;align-items:center;justify-content:center;font-size:56px}
.wmbody{padding:16px 18px 24px}
.wmtitle{font-size:20px;font-weight:800;margin-bottom:3px}
.wmmeta{font-size:12px;color:var(--muted);margin-bottom:12px}
.wmsyn{font-size:13px;color:rgba(255,255,255,.62);line-height:1.8}
.wmclose{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:30px;height:30px;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.links-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.extlink{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);text-decoration:none;background:rgba(255,255,255,.04);transition:background .15s}
.extlink:hover{background:rgba(255,255,255,.1);color:var(--text)}

/* WHY MODAL */
.whymodal{position:fixed;inset:0;z-index:60;background:rgba(4,4,15,.88);display:flex;align-items:flex-end}
.whybox{background:#08081a;border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;border-top:1px solid var(--border);max-height:55vh;overflow-y:auto}

/* TOOLTIP */
#tip{position:fixed;background:rgba(6,6,20,.96);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:5px 12px;font-size:12px;font-weight:600;pointer-events:none;z-index:25;white-space:nowrap;transform:translateX(-50%);transition:opacity .1s}

/* TOAST */
.toast{position:fixed;top:96px;left:50%;transform:translateX(-50%);z-index:50;background:linear-gradient(135deg,#180a3a,#081828);border:1px solid rgba(123,95,255,.4);border-radius:14px;padding:12px 16px;max-width:300px;width:90%;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
.toast.show{opacity:1}

/* STATS */
.stats{position:fixed;bottom:0;left:0;right:0;z-index:19;background:linear-gradient(to top,rgba(4,4,15,.85),transparent);padding:7px;display:flex;justify-content:center;gap:24px;pointer-events:none;transition:right .32s}
.stat{font-size:10px;color:var(--muted);text-align:center}
.stat b{display:block;font-size:15px;font-weight:700;color:var(--text)}

/* ZOOM */
.zoom{position:fixed;right:14px;bottom:66px;z-index:20;display:flex;flex-direction:column;gap:4px;transition:right .32s}
.zbtn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<script src="data.js" defer></script>

<!-- INTRO -->
<div class="intro" id="intro" onclick="startApp()">
  <canvas id="intro-canvas"></canvas>
  <div class="intro-text">
    <div class="intro-ad">Ad</div>
    <div class="intro-astra">Astra</div>
    
  </div>
  <div class="intro-tap">toca para explorar</div>
</div>

<!-- 3D -->
<div id="three-wrap"></div>
<div id="label-overlay"></div>
<div id="map-dim" style="position:fixed;inset:0;z-index:14;background:rgba(4,4,15,.7);opacity:0;transition:opacity .3s;pointer-events:none"></div>
<div id="legend" style="display:none"></div>

<!-- HEADER -->
<div class="hdr" id="hdr" style="display:none">
  <div class="logo">Ad <span>Astra</span></div>
  <div class="sbox">
    <span class="sicon">🔍</span>
    <input class="sinput" id="sinput" placeholder="concepto, obra o autor..." autocomplete="off" oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div class="sresults" id="sresults" style="display:none"></div>
  </div>
  <button class="ibtn" onclick="resetView()" title="resetear">⟳</button>

</div>

<!-- MODE BAR -->
<div class="mbar" id="mbar" style="display:none">
  <button class="mbtn active" id="m-mapa" onclick="setMode('mapa')">🗺 MAPA</button>
  <button class="mbtn" id="m-caminos" onclick="setMode('caminos')">🧭 CAMINOS</button>
  <button class="mbtn" id="m-sensaciones" onclick="setMode('sensaciones')">💫 SENSACIÓN</button>
  <button class="mbtn" id="m-cronologia" onclick="setMode('cronologia')">📅 ÉPOCA</button>
  <button class="mbtn" id="m-laboratorio" onclick="setMode('laboratorio')">🧪 LAB</button>
  <button class="mbtn" id="m-perfil" onclick="setMode('perfil')">🧬 PERFIL</button>
</div>

<!-- FILTER BAR -->
<div class="fbar" id="fbar" style="display:none"></div>

<!-- FULL PANELS -->
<div class="fpanel" id="fp-caminos"></div>
<div class="fpanel" id="fp-sensaciones"></div>
<div class="fpanel" id="fp-cronologia"></div>
<div class="fpanel" id="fp-laboratorio"></div>
<div class="fpanel" id="fp-perfil"></div>

<!-- NODE PANEL -->
<div class="spanel" id="spanel">
  <div class="sp-head">
    <span class="sp-cat" id="sp-cat">concepto</span>
    <button class="sp-close" onclick="closePanel()">×</button>
  </div>
  <div class="sp-body" id="sp-body"></div>
</div>

<!-- WORK MODAL -->
<div class="wmodal" id="wmodal" style="display:none" onclick="this.style.display='none'">
  <div class="wmodalbox" onclick="event.stopPropagation()">
    <button class="wmclose" onclick="document.getElementById('wmodal').style.display='none'">×</button>
    <div id="wm-cover"></div>
    <div class="wmbody">
      <div id="wm-badge" style="margin-bottom:8px"></div>
      <div class="wmtitle" id="wm-title"></div>
      <div class="wmmeta" id="wm-meta"></div>
      <div id="wm-dna"></div>
      <div class="wmsyn" id="wm-syn">Cargando...</div>
      <div class="links-row" id="wm-links"></div>
    </div>
  </div>
</div>

<!-- WHY MODAL -->
<div class="whymodal" id="whymodal" style="display:none" onclick="this.style.display='none'">
  <div class="whybox" onclick="event.stopPropagation()">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--accent2)" id="why-title"></div>
    <div style="font-size:13px;color:rgba(255,255,255,.65);line-height:1.8;margin-bottom:16px" id="why-text"></div>
    <button style="width:100%;padding:10px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:12px" onclick="document.getElementById('whymodal').style.display='none'">cerrar</button>
  </div>
</div>

<div id="tip" style="opacity:0;top:0;left:0"></div>

<div class="toast" id="toast">
  <div style="font-size:11px;font-weight:700;color:#a29bfe;margin-bottom:4px">🔓 Nodo desbloqueado</div>
  <div id="toast-text" style="font-size:11px;color:var(--muted)"></div>
</div>

<div class="zoom" id="zoom" style="display:none">
  <button class="zbtn" onclick="adjZ(-150)">+</button>
  <button class="zbtn" onclick="adjZ(150)">−</button>
</div>

<div class="stats" id="stats" style="display:none">
  <div class="stat"><b id="sn">0</b>conceptos</div>
  <div class="stat"><b id="sw">0</b>obras</div>
  <div class="stat"><b id="sc">0</b>conexiones</div>
</div>

<script>
// ══ CATEGORIES ══════════════════════════
const CATS={
  tiempo:{ids:['viajes-tiempo','paradojas-temporales','universos-paralelos','realidades-simuladas','suenos-compartidos','mensajes-futuro','ecos-pasado','vidas-anteriores','recuerdos-heredados'],color:'#64c8ff',label:'Tiempo & Realidad'},
  mente:{ids:['inteligencia-artificial','conciencias-digitales','mentes-colmena','singularidad-tecnologica','posthumanismo','inmortalidad','transferencia-mental','memoria','identidad','libre-albedrio','memorias-artificiales','recuerdos-implantados','simulacros-copias','realidad-virtual'],color:'#a29bfe',label:'Mente & Tecnología'},
  contacto:{ids:['contacto-extraterrestre','primer-contacto','civilizaciones-alienígenas','lenguajes-extraterrestres','gran-silencio','bosque-oscuro','hipotesis-zoo','hipotesis-planeta-prohibido','senales-desconocidas'],color:'#00e5c0',label:'Contacto & Silencio'},
  ruinas:{ids:['arqueologia-cosmica','artefactos-alienígenas','ruinas-civilizaciones','civilizaciones-olvidadas','conocimientos-perdidos','mundos-abandonados','planetas-cementerio','ciudades-enterradas','monumentos-extintas','herederos-imperios','ruinas-orbitales','satelites-muertos','especies-desaparecidas','especies-creadoras','mensajes-extintas'],color:'#fd79a8',label:'Ruinas & Memoria'},
  mega:{ids:['megaestructuras','mundos-anillo','esferas-dyson','naves-generacionales','colonizacion-espacial','terraformacion','ascensores-espaciales','agujeros-negros','agujeros-gusano','universos-moribundos','fin-universo','energia-estelar','mundos-artificiales'],color:'#f5c518',label:'Megaescala & Cosmos'},

function checkSecrets(){

// ══ INTRO ════════════════════════════════
function initIntro(){
  const cv=document.getElementById('intro-canvas');
  const cx=cv.getContext('2d');
  let W,H,pts=[],shoots=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  function init(){
    pts=[];shoots=[];
    for(let i=0;i<300;i++)pts.push({t:'s',x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random(),da:(.001+Math.random()*.004)*(Math.random()<.5?1:-1)});
    for(let i=0;i<6;i++)pts.push({t:'c',x:W*.25+Math.random()*W*.5,y:H*.2+Math.random()*H*.6,r:60+Math.random()*120,h:200+Math.random()*160,a:0,da:.002+Math.random()*.003,ma:.045+Math.random()*.065,dx:(Math.random()-.5)*.1,dy:(Math.random()-.5)*.07});
  }

  // Shooting star — spawn randomly
  function spawnShoot(){
    const angle=Math.PI*.15+Math.random()*.3; // diagonal
    const secret=Math.random()<.15; // 15% chance secret star
    shoots.push({
      x:Math.random()*W*.6,y:Math.random()*H*.4,
      vx:Math.cos(angle)*12,vy:Math.sin(angle)*12,
      len:80+Math.random()*120,a:1,life:1,secret,
      trail:[]
    });
    if(secret){
      // Mark position for click detection
      shoots[shoots.length-1].startX=shoots[shoots.length-1].x;
      shoots[shoots.length-1].startY=shoots[shoots.length-1].y;
    }
  }
  setInterval(()=>{if(document.getElementById('intro').style.display!=='none')spawnShoot();},3000+Math.random()*4000);

  // Click on shooting star
  cv.addEventListener('click',e=>{
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    shoots.forEach(sh=>{
      if(!sh.secret)return;
      const d=Math.sqrt((mx-sh.x)**2+(my-sh.y)**2);
      if(d<40){
        // Easter egg: show secret message
        document.getElementById('toast-text').textContent='Has encontrado la estrella fugaz. Primer secreto: todo está conectado.';
        const t=document.getElementById('toast');t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),4000);
        sh.secret=false;
      }
    });
  });

  function draw(){
    if(document.getElementById('intro').style.display==='none')return;
    cx.clearRect(0,0,W,H);
    const bg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
    bg.addColorStop(0,'#06061a');bg.addColorStop(.7,'#03030e');bg.addColorStop(1,'#020208');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      if(p.t==='s'){p.a+=p.da;if(p.a>1||p.a<0)p.da*=-1;cx.fillStyle=`rgba(255,255,255,${p.a*.55})`;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();}
      else if(p.t==='c'){p.a=Math.min(p.ma,p.a+p.da);p.x+=p.dx;p.y+=p.dy;const g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,`hsla(${p.h},70%,55%,${p.a})`);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();}
    });

    // Shooting stars
    shoots.forEach((sh,i)=>{
      sh.x+=sh.vx;sh.y+=sh.vy;sh.life-=.025;sh.a=sh.life;
      if(sh.life<=0){shoots.splice(i,1);return;}
      const tx=sh.x-sh.vx*(sh.len/12),ty=sh.y-sh.vy*(sh.len/12);
      const grad=cx.createLinearGradient(tx,ty,sh.x,sh.y);
      const col=sh.secret?'rgba(0,229,192,':'rgba(255,255,255,';
      grad.addColorStop(0,col+'0)');grad.addColorStop(1,col+sh.a+')');
      cx.strokeStyle=grad;cx.lineWidth=sh.secret?2:1.5;
      cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(sh.x,sh.y);cx.stroke();
      // Head glow
      cx.fillStyle=col+sh.a+')';cx.beginPath();cx.arc(sh.x,sh.y,sh.secret?3:1.5,0,Math.PI*2);cx.fill();
    });

    requestAnimationFrame(draw);
  }
  resize();init();draw();
  window.addEventListener('resize',()=>{resize();init();});
}

// ══ THREE.JS 3D ══════════════════════════
let renderer,scene,camera;
let meshes={},edges={},labels={};
let pos3d={};
let ray,mouse2;
let pDown=false,pMoved=false,pX=0,pY=0,pdX=0,pdY=0;
let pinchD=0,pinchR=950;
let oTheta=0,oPhi=Math.PI/2,oR=950;
let tTheta=0,tPhi=Math.PI/2,tR=950;
let autoRot=false,animOn=false;

function initThree(){
  const T=window.THREE;window.T3=T;
  const wrap=document.getElementById('three-wrap');
  const W=window.innerWidth,H=window.innerHeight;

  renderer=new T.WebGLRenderer({antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x04040f,1);
  renderer.setSize(W,H);
  wrap.appendChild(renderer.domElement);

  scene=new T.Scene();
  camera=new T.PerspectiveCamera(55,W/H,.1,5000);
  camera.position.set(0,0,oR);

  scene.add(new T.AmbientLight(0xffffff,.7));
  const dl=new T.DirectionalLight(0xffffff,.5);dl.position.set(1,1,1);scene.add(dl);

  // Starfield
  const sg=new T.BufferGeometry();
  const sv=[];for(let i=0;i<4000;i++)sv.push((Math.random()-.5)*6000,(Math.random()-.5)*6000,(Math.random()-.5)*6000);
  sg.setAttribute('position',new T.Float32BufferAttribute(sv,3));
  scene.add(new T.Points(sg,new T.PointsMaterial({color:0xffffff,size:.7,transparent:true,opacity:.45})));

  ray=new T.Raycaster();
  mouse2=new T.Vector2();

  buildGraph();
  bindEvents();
  animOn=true;
  loop3d();
}

function resizeR(){
  if(!renderer||!camera)return;
  const po=document.getElementById('spanel').classList.contains('open');
  const pw=po&&window.innerWidth>680?Math.min(420,Math.round(window.innerWidth*.42)):0;
  const W=window.innerWidth-pw,H=window.innerHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H;camera.updateProjectionMatrix();
}

function loop3d(){
  if(!animOn)return;
  requestAnimationFrame(loop3d);
  // Orbit
  if(autoRot&&!selId)tTheta+=.0035;
  // No inertia — snap immediately when dragging, smooth only for auto-rotate
  const drag=pDown;
  oTheta+=drag?(tTheta-oTheta):(tTheta-oTheta)*.06;
  oPhi+=drag?(tPhi-oPhi):(tPhi-oPhi)*.06;
  oR+=(tR-oR)*.1;
  oPhi=Math.max(.05,Math.min(Math.PI-.05,oPhi));
  camera.position.set(oR*Math.sin(oPhi)*Math.sin(oTheta),oR*Math.cos(oPhi),oR*Math.sin(oPhi)*Math.cos(oTheta));
  camera.lookAt(0,0,0);
  updateLabels();
  renderer.render(scene,camera);
}

function buildGraph(){
  const T=window.THREE;
  const all=[...nids,...Object.keys(SECRET_NODES||{}).filter(id=>visited.has(id))];

  // Spherical golden angle distribution
  all.forEach((id,i)=>{
    const phi=Math.acos(1-2*(i+.5)/all.length);
    const theta=Math.PI*(1+Math.sqrt(5))*i;
    const r=280+Math.random()*70;
    pos3d[id]={x:r*Math.sin(phi)*Math.cos(theta),y:r*Math.sin(phi)*Math.sin(theta),z:r*Math.cos(phi)};
  });

  // 3D force iterations
  for(let it=0;it<160;it++){
    const f={};all.forEach(id=>{f[id]={x:0,y:0,z:0};});
    for(let i=0;i<all.length;i++){
      for(let j=i+1;j<all.length;j++){
        const a=all[i],b=all[j],pa=pos3d[a],pb=pos3d[b];
        if(!pa||!pb)continue;
        const dx=pb.x-pa.x,dy=pb.y-pa.y,dz=pb.z-pa.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1,rep=18000/(d*d);
        f[a].x-=dx/d*rep;f[a].y-=dy/d*rep;f[a].z-=dz/d*rep;
        f[b].x+=dx/d*rep;f[b].y+=dy/d*rep;f[b].z+=dz/d*rep;
      }
    }
    all.forEach(id=>{
      const p=pos3d[id];if(!p)return;
      (NODES[id]?.connections||[]).forEach(cid=>{
        const pc=pos3d[cid];if(!pc)return;
        const dx=pc.x-p.x,dy=pc.y-p.y,dz=pc.z-p.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1,ideal=190,att=.016*(d-ideal);
        f[id].x+=dx/d*att;f[id].y+=dy/d*att;f[id].z+=dz/d*att;
      });
      f[id].x-=p.x*.0012;f[id].y-=p.y*.0012;f[id].z-=p.z*.0012;
    });
    const damp=it<80?.32:it<130?.14:.06;
    all.forEach(id=>{
      const p=pos3d[id];if(!p)return;
      p.x+=f[id].x*damp;p.y+=f[id].y*damp;p.z+=f[id].z*damp;
    });
  }

  all.forEach(id=>makeMesh(id));
  all.forEach(id=>{
    (NODES[id]?.connections||[]).forEach(cid=>{
      if(!pos3d[cid]||cid<id)return;
      const key=[id,cid].sort().join('|');
      const T=window.THREE;
      const pts=[new T.Vector3(pos3d[id].x,pos3d[id].y,pos3d[id].z),new T.Vector3(pos3d[cid].x,pos3d[cid].y,pos3d[cid].z)];
      const line=new T.Line(new T.BufferGeometry().setFromPoints(pts),new T.LineBasicMaterial({color:0x1a2a3a,transparent:true,opacity:.22}));
      line.userData={a:id,b:cid};scene.add(line);edges[key]=line;
    });
  });
}

function makeMesh(id){
  const T=window.THREE;
  const p=pos3d[id];if(!p)return;
  const col=nCol[id]||'#7b5fff';
  const secret=!!(SECRET_NODES||{})[id];
  const sz=5+(NODES[id]?.connections?.length||0)*.5;
  const mat=new T.MeshPhongMaterial({color:new T.Color(col),emissive:new T.Color(col),emissiveIntensity:.25,transparent:secret,opacity:secret?.7:1,wireframe:secret});
  const mesh=new T.Mesh(new T.SphereGeometry(sz,14,14),mat);
  mesh.position.set(p.x,p.y,p.z);mesh.userData.id=id;
  scene.add(mesh);meshes[id]=mesh;

  // HTML overlay labels instead of 3D sprites
  const overlay=document.getElementById('label-overlay');
  nids.forEach(id=>{
    const div=document.createElement('div');
    div.className='nlabel';
    div.id='lbl-'+id;
    div.textContent=NODES[id]?.label||id;
    div.style.color=nCol[id]||'#fff';
    div.style.opacity='0';
    overlay.appendChild(div);
    labels[id]=div;
  });
}

function addSecretMesh(id){
  if(!pos3d[id])pos3d[id]={x:(Math.random()-.5)*300,y:(Math.random()-.5)*300,z:(Math.random()-.5)*300};
  makeMesh(id);
}

// Top 20 most connected nodes — always show labels
const topNodes=new Set(
  [...nids].sort((a,b)=>(NODES[b]?.connections?.length||0)-(NODES[a]?.connections?.length||0)).slice(0,20)
);

function updateLabels(){
  const T=window.THREE;if(!T||!camera||!renderer)return;
  const W=renderer.domElement.width/window.devicePixelRatio;
  const H=renderer.domElement.height/window.devicePixelRatio;
  const panelOpen=document.getElementById('spanel').classList.contains('open');
  const pw=panelOpen&&window.innerWidth>680?Math.min(420,Math.round(window.innerWidth*.42)):0;

  nids.forEach(id=>{
    const lbl=labels[id];if(!lbl)return;
    const p=pos3d[id];if(!p)return;
    const isSel=selId===id;
    const isConn=selId&&(NODES[selId]?.connections||[]).includes(id);
    const isTop=topNodes.has(id);
    const show=isSel||isConn||isTop||(oR<550);
    if(!show){lbl.style.opacity='0';return;}

    const vec=new THREE.Vector3(p.x,p.y,p.z);
    vec.project(camera);
    const sx=(vec.x*.5+.5)*W;
    const sy=(-.5*vec.y+.5)*H;
    if(vec.z>1){lbl.style.opacity='0';return;}
    if(sx<0||sx>W-pw||sy<20||sy>H-60){lbl.style.opacity='0';return;}

    lbl.style.left=sx+'px';
    lbl.style.top=(sy-10)+'px';
    lbl.style.opacity=isSel?'1':isConn?'.9':isTop?'.6':'.45';
    lbl.style.fontSize=isSel?'13px':isConn?'11px':'10px';
    lbl.style.fontWeight=isSel||isConn?'700':'500';
  });
}

function buildLegend(){
  const leg=document.getElementById('legend');
  if(!leg)return;
  leg.innerHTML=Object.entries(CATS).map(([k,{color,label}])=>`
    <div class="leg-item" id="leg-${k}" onclick="setFilter('${k}','cat');setMode('mapa')" style="--lc:${color}">
      <span class="leg-dot" style="background:${color}"></span>${label}
    </div>`).join('');
  leg.style.display='block';
}

function updateLegend(){
  Object.keys(CATS).forEach(k=>{
    const el=document.getElementById('leg-'+k);
    if(el)el.classList.toggle('on',aFilter===k);
  });
}

// ══ EVENTS ═══════════════════════════════
function bindEvents(){
  const el=renderer.domElement;
  el.addEventListener('mousedown',e=>{pDown=true;pMoved=false;pX=e.clientX;pY=e.clientY;pdX=pX;pdY=pY;autoRot=false;});
  el.addEventListener('mousemove',e=>{
    if(pDown){
      const dx=e.clientX-pX,dy=e.clientY-pY;
      if(Math.abs(e.clientX-pdX)>4||Math.abs(e.clientY-pdY)>4)pMoved=true;
      tTheta+=dx*.005;tPhi=Math.max(.05,Math.min(Math.PI-.05,tPhi-dy*.005));
      pX=e.clientX;pY=e.clientY;
    } else doHover(e.clientX,e.clientY);
  });
  el.addEventListener('mouseup',e=>{if(!pMoved)doClick(e.clientX,e.clientY);pDown=false;});
  el.addEventListener('wheel',e=>{e.preventDefault();tR=Math.max(180,Math.min(2400,tR+e.deltaY*.9));},{passive:false});
  el.addEventListener('touchstart',e=>{
    if(e.touches.length===1){pDown=true;pMoved=false;pX=e.touches[0].clientX;pY=e.touches[0].clientY;pdX=pX;pdY=pY;autoRot=false;}
    else if(e.touches.length===2){pDown=false;const d=tdist(e);pinchD=d;pinchR=tR;}
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&pDown){
      const dx=e.touches[0].clientX-pX,dy=e.touches[0].clientY-pY;
      if(Math.abs(dx)>4||Math.abs(dy)>4)pMoved=true;
      tTheta+=dx*.005;tPhi=Math.max(.05,Math.min(Math.PI-.05,tPhi-dy*.005));
      pX=e.touches[0].clientX;pY=e.touches[0].clientY;
    } else if(e.touches.length===2){
      tR=Math.max(180,Math.min(2400,pinchR*(pinchD/tdist(e))));
    }
  },{passive:false});
  el.addEventListener('touchend',e=>{if(!pMoved&&e.changedTouches.length>0)doClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);pDown=false;},{passive:true});
  window.addEventListener('resize',resizeR);
}
function tdist(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

function getHit(cx,cy){
  const T=window.THREE;
  const rect=renderer.domElement.getBoundingClientRect();
  mouse2.x=((cx-rect.left)/rect.width)*2-1;
  mouse2.y=-((cy-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse2,camera);
  const hits=ray.intersectObjects(Object.values(meshes));
  return hits.length?hits[0].object.userData.id:null;
}

function doHover(cx,cy){
  const id=getHit(cx,cy);
  const tip=document.getElementById('tip');
  if(id&&NODES[id]){renderer.domElement.style.cursor='pointer';tip.textContent=NODES[id].label;tip.style.left=cx+'px';tip.style.top=(cy-38)+'px';tip.style.opacity='1';}
  else{renderer.domElement.style.cursor='grab';tip.style.opacity='0';}
}

function doClick(cx,cy){
  document.getElementById('tip').style.opacity='0';
  const id=getHit(cx,cy);
  if(id)openNode(id);else closePanel();
}

function hlNode(id){
  const T=window.THREE;
  Object.entries(meshes).forEach(([nid,m])=>{
    const c=nCol[nid]||'#7b5fff';
    m.material.color.set(c);m.material.emissive.set(c);
    m.material.emissiveIntensity=.25;m.scale.setScalar(1);
  });
  Object.values(edges).forEach(l=>{l.material.color.set(0x1a2a3a);l.material.opacity=.22;});
  if(!id)return;
  const sm=meshes[id];if(sm){sm.material.emissiveIntensity=1.3;sm.scale.setScalar(1.6);}
  const conn=NODES[id]?.connections||[];
  conn.forEach(cid=>{
    const cm=meshes[cid];if(cm){cm.material.emissiveIntensity=.75;cm.scale.setScalar(1.25);}
    const key=[id,cid].sort().join('|');
    const line=edges[key];if(line){line.material.color.set(nCol[id]||'#7b5fff');line.material.opacity=.85;}
  });
  Object.keys(meshes).forEach(nid=>{if(nid!==id&&!conn.includes(nid))meshes[nid].material.emissiveIntensity=.04;});
  // Fly to node
  const p=pos3d[id];
  if(p){const len=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z)||1;tPhi=Math.acos(Math.max(-1,Math.min(1,p.y/len)));tTheta=Math.atan2(p.x,p.z);tR=580;}
}

function nodeHasWorkType(id,wt){
  if(!wt)return true;
  return (NODES[id]?.works||[]).some(w=>w.type===wt);
}

function applyFilter(){
  Object.entries(meshes).forEach(([id,m])=>{
    let vis=true;
    if(aFilter){
      if(fType==='cat')vis=nCat[id]===aFilter;
      else if(fType==='sens')vis=(SENSATIONS[aFilter]?.nodes||[]).includes(id);
      else if(fType==='path'){const p=(PATHS||[]).find(x=>x.id===aFilter);vis=p?p.nodes.includes(id):true;}
    }
    // Apply work type filter on top
    if(vis&&wTypeFilter)vis=nodeHasWorkType(id,wTypeFilter);
    m.material.opacity=vis?1:.04;m.material.transparent=!vis;
  });
  Object.values(edges).forEach(l=>{
    const va=meshes[l.userData.a]?.material.opacity>.1;
    const vb=meshes[l.userData.b]?.material.opacity>.1;
    l.material.opacity=(va&&vb)?.22:.02;
  });
}

const TL={libro:'📖 Libro',pelicula:'🎬 Película',serie:'📺 Serie',comic:'📓 Cómic',videojuego:'🎮 Videojuego'};
const TB={libro:'bl',pelicula:'bp',serie:'bs',comic:'bc',videojuego:'bv'};

function openNode(id){
  selId=id;autoRot=false;visit(id);hlNode(id);
  const node=NODES[id];if(!node)return;
  const col=nCol[id]||'#7b5fff';
  const catLabel=nCat[id]?CATS[nCat[id]]?.label:((SECRET_NODES||{})[id]?'✦ Secreto':'Concepto');
  const dnaE=Object.entries(WORK_DNA||{}).filter(([_,d])=>d.dna.some(e=>e.node===id));

  document.getElementById('sp-cat').textContent=catLabel;
  document.getElementById('sp-body').innerHTML=`
    <span class="pcbadge" style="color:${col};border-color:${col}33;background:${col}11">${catLabel}</span>
    <div class="ptitle">${node.label}</div>
    <div class="pdesc">${node.desc}</div>
    <div class="psec">conexiones · ${(node.connections||[]).filter(c=>NODES[c]).length}</div>
    <div class="clist">
      ${(node.connections||[]).filter(c=>NODES[c]).map(cid=>{
        const key=[id,cid].sort().join('|');
        const why=!!(EDGE_REASONS||{})[key.replace(/\|/g,'||')];
        return`<span class="cchip" style="border-color:${nCol[cid]||'#fff'}44;color:${nCol[cid]||'#fff'}" onclick="openNode('${cid}')">${NODES[cid].label}</span>${why?`<span class="cwhy" onclick="showWhy('${id}','${cid}')">¿por qué?</span>`:''}`;
      }).join('')}
    </div>
    ${dnaE.length?`<div class="psec">peso en obras</div>${dnaE.slice(0,4).map(([t,d])=>{const e=d.dna.find(x=>x.node===id);return`<div class="drow"><div style="font-size:10px;color:var(--muted);cursor:pointer" onclick="openWork('${t.replace(/'/g,"\\'")}','${d.type||'libro'}','${(d.author||'').replace(/'/g,"\\'")}',null)">${t}</div><div class="dtrack"><div class="dfill" style="width:${e.pct}%;background:${col}"></div></div></div>`;}).join('')}`:''}
    <div class="psec">obras · ${node.works.length}</div>
    <div class="wlist">
      ${node.works.map(w=>`<div class="wcard" onclick="openWork('${w.title.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${w.type}','${(w.author||'').replace(/'/g,"\\'")}',null)">
        <span class="wbadge ${TB[w.type]||'bl'}">${TL[w.type]||w.type}</span>
        <div class="winfo">
          <div class="wt">${w.title}</div>
          <div class="wa" onclick="event.stopPropagation();openAuthor('${(w.author||'').replace(/'/g,"\\'")}')">${w.author}</div>
        </div>
      </div>`).join('')}
    </div>`;

  document.getElementById('spanel').classList.add('open');
  shiftUI(true);
}

function closePanel(){
  selId=null;hlNode(null);
  document.getElementById('spanel').classList.remove('open');
  shiftUI(false);
}

function shiftUI(open){
  const pw=open&&window.innerWidth>680?Math.min(420,Math.round(window.innerWidth*.42)):0;
  const v=pw?pw+'px':'0';
  ['three-wrap','hdr','mbar','fbar','zoom','stats','legend'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.right=v;});
  setTimeout(resizeR,340);
}

// ══ TRANSLATION HELPER ══════════════════
async function translate(text){
  if(!text||text.length<10)return text;
  try{
    // Split into chunks of 500 chars
    const chunks=[];
    for(let i=0;i<Math.min(text.length,1600);i+=480)chunks.push(text.slice(i,i+480));
    const translated=await Promise.all(chunks.map(async chunk=>{
      const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=en|es`);
      const d=await r.json();
      return d.responseData?.translatedText||chunk;
    }));
    return translated.join(' ');
  }catch(e){return text;}
}

function setCover(html){document.getElementById('wm-cover').innerHTML=html;}
function setSyn(text){document.getElementById('wm-syn').textContent=text;}
function coverImg(src,type){const ph=TE[type]||'📖';return `<img class="wmcover" style="object-fit:contain;background:#111" src="${src}" onerror="this.parentNode.innerHTML='<div class=\'wmph\'>'+'${ph}'+'</div>'">`;}

// ══ OPEN WORK ════════════════════════════
async function openWork(title,type,author,fromNode){
  const modal=document.getElementById('wmodal');
  setCover(`<div class="wmph">${TE[type]||'📖'}</div>`);
  document.getElementById('wm-badge').innerHTML=`<span class="wbadge ${TB[type]||'bl'}">${TL[type]||type}</span>`;
  document.getElementById('wm-title').textContent=title;
  document.getElementById('wm-meta').textContent=author||'';
  document.getElementById('wm-dna').innerHTML='';
  setSyn('Cargando...');
  document.getElementById('wm-links').innerHTML='';
  modal.style.display='flex';

  // DNA
  const dna=(WORK_DNA||{})[title];
  if(dna){
    document.getElementById('wm-dna').innerHTML=`
      <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div class="psec" style="margin-top:0">ADN conceptual</div>
        ${dna.dna.map(e=>`<div class="drow">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
            <span style="cursor:pointer;color:${nCol[e.node]||'#fff'}" onclick="openNode('${e.node}');document.getElementById('wmodal').style.display='none'">${NODES[e.node]?.label||e.node}</span>
            <span style="color:var(--muted)">${e.pct}%</span>
          </div>
          <div class="dtrack"><div class="dfill" style="width:${e.pct}%;background:${nCol[e.node]||'#7b5fff'}"></div></div>
        </div>`).join('')}
      </div>`;
  }

  // External links
  const q=encodeURIComponent(title),aq=encodeURIComponent(author||'');
  const sfeSlug=title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const links=[];
  if(type==='libro'){
    links.push({label:'Goodreads',url:`https://www.goodreads.com/search?q=${q}+${aq}`});
    links.push({label:'Open Library',url:`https://openlibrary.org/search?q=${q}`});
    links.push({label:'SFE',url:`https://sf-encyclopedia.com/entry/${sfeSlug}`});
    links.push({label:'Wikipedia',url:`https://es.wikipedia.org/wiki/${q}`});
  } else if(type==='pelicula'||type==='serie'){
    links.push({label:'IMDb',url:`https://www.imdb.com/find/?q=${q}`});
    links.push({label:'Dónde ver',url:`https://www.justwatch.com/es/buscar?q=${q}`});
    links.push({label:'Wikipedia',url:`https://es.wikipedia.org/wiki/${q}`});
  } else if(type==='videojuego'){
    links.push({label:'Metacritic',url:`https://www.metacritic.com/search/${q}/`});
    links.push({label:'Wikipedia',url:`https://es.wikipedia.org/wiki/${q}`});
  } else {
    links.push({label:'Wikipedia',url:`https://es.wikipedia.org/wiki/${q}`});
  }
  document.getElementById('wm-links').innerHTML=links.map(l=>`<a class="extlink" href="${l.url}" target="_blank" rel="noopener">${l.label} ↗</a>`).join('');

  try{
    if(type==='pelicula'||type==='serie'){
      await fetchFilmWork(title,type,author);
    } else if(type==='libro'){
      await fetchBookWork(title,type,author);
    } else {
      await fetchGenericWork(title,type,author);
    }
  }catch(e){setSyn('No se pudo cargar la sinopsis.');}
}

async function fetchFilmWork(title,type,author){
  const st=type==='serie'?'tv':'movie';
  // TMDB ES
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/${st}?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=es-ES`);
    const d=await r.json();
    const item=d.results?.[0];
    if(item){
      if(item.poster_path)setCover(coverImg(`https://image.tmdb.org/t/p/w500${item.poster_path}`,type));
      if(item.overview&&item.overview.length>20){setSyn(item.overview);return;}
    }
  }catch(e){}
  // TMDB EN + translate
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/${st}?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=en-US`);
    const d=await r.json();
    const item=d.results?.[0];
    if(item){
      if(item.poster_path&&document.getElementById('wm-cover').querySelector('.wmph'))setCover(coverImg(`https://image.tmdb.org/t/p/w500${item.poster_path}`,type));
      if(item.overview){const t=await translate(item.overview);setSyn(t);return;}
      if(item.id){document.getElementById('wm-links').innerHTML+=`<a class="extlink" href="https://www.themoviedb.org/${st}/${item.id}" target="_blank" rel="noopener">TMDB ↗</a>`;}
    }
  }catch(e){}
  // Wikipedia fallback
  await fetchWikiWork(title,type,false);
}

async function fetchBookWork(title,type,author){
  let covered=false;
  // 1. Open Library — cover + description
  try{
    const r=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(title)}&limit=1&fields=cover_i,key,first_sentence`);
    if(r.ok){
      const d=await r.json();
      const doc=d.docs?.[0];
      if(doc?.cover_i){
        setCover(coverImg(`https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg`,type));
        covered=true;
      }
      // Open Library description
      if(doc?.key){
        try{
          const wr=await fetch(`https://openlibrary.org${doc.key}.json`);
          if(wr.ok){
            const wd=await wr.json();
            const desc=typeof wd.description==='string'?wd.description:wd.description?.value;
            if(desc&&desc.length>30){
              const t=await translate(desc.slice(0,600));
              setSyn(t);return;
            }
          }
        }catch(e){}
      }
    }
  }catch(e){}

  // 2. Google Books — synopsis
  try{
    const q=author?`intitle:${encodeURIComponent(title)}+inauthor:${encodeURIComponent(author.split(' ').pop())}`:`intitle:${encodeURIComponent(title)}`;const gbFields='items/volumeInfo(description,imageLinks,categories,publishedDate)';
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1&fields=${gbFields||'items/volumeInfo(description,imageLinks)'}`);
    if(r.ok){
      const d=await r.json();
      const info=d.items?.[0]?.volumeInfo;
      if(info?.imageLinks?.thumbnail&&!covered){
        setCover(coverImg(info.imageLinks.thumbnail.replace('http://','https://').replace('zoom=1','zoom=2'),type));
        covered=true;
      }
      if(info?.description&&info.description.length>30){
        const t=await translate(info.description.slice(0,1200));
        setSyn(t);return;
      }
    }
  }catch(e){}

  // 3. Wikipedia ES
  await fetchWikiWork(title,type,covered);
}

async function fetchGenericWork(title,type,author){
  await fetchWikiWork(title,type,false);
}

async function fetchWikiWork(title,type,covered){
  // Try ES first
  try{
    const wq=encodeURIComponent(title.replace(/ /g,'_'));
    const r=await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${wq}`);
    if(r.ok){
      const d=await r.json();
      // Skip disambiguation pages
      if(!d.type?.includes('disambig')&&d.extract&&d.extract.length>50){
        if(!covered&&d.thumbnail?.source)setCover(coverImg(d.thumbnail.source,type));
        setSyn(d.extract);return;
      }
    }
  }catch(e){}
  // Try EN + translate
  try{
    const wq=encodeURIComponent(title.replace(/ /g,'_'));
    const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wq}`);
    if(r.ok){
      const d=await r.json();
      if(!d.type?.includes('disambig')&&d.extract&&d.extract.length>50){
        if(!covered&&d.thumbnail?.source)setCover(coverImg(d.thumbnail.source,type));
        const t=await translate(d.extract.slice(0,1000));
        setSyn(t);return;
      }
    }
  }catch(e){}
  setSyn('Sinopsis no disponible.');
}

async function tryEnWiki(title,type,covered=false){
  await fetchWikiWork(title,type,covered);
}

// ══ OPEN AUTHOR ══════════════════════════
async function openAuthor(author){
  if(!author)return;
  const modal=document.getElementById('wmodal');
  setCover(`<div class="wmph">✍️</div>`);
  document.getElementById('wm-badge').innerHTML=`<span class="wbadge bl">✍️ Autor</span>`;
  document.getElementById('wm-title').textContent=author;
  document.getElementById('wm-meta').textContent='';
  setSyn('Cargando biografía...');
  document.getElementById('wm-dna').innerHTML='';

  // Works in catalog
  const aw=[];
  nids.forEach(id=>(NODES[id]?.works||[]).forEach(w=>{
    if(w.author===author&&!aw.find(x=>x.title===w.title))aw.push(w);
  }));

  if(aw.length){
    document.getElementById('wm-dna').innerHTML=`
      <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div class="psec" style="margin-top:0">obras en el mapa · ${aw.length}</div>
        <div class="wlist">${aw.map(w=>`<div class="wcard" onclick="openWork('${w.title.replace(/'/g,"\'").replace(/"/g,'&quot;')}','${w.type}','${author.replace(/'/g,"\'")}',null)">
          <span class="wbadge ${TB[w.type]||'bl'}">${TL[w.type]||w.type}</span>
          <div class="winfo"><div class="wt">${w.title}</div></div>
        </div>`).join('')}</div>
      </div>`;
  }

  // Links
  const aq=encodeURIComponent(author);
  const sfeSlug=author.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  document.getElementById('wm-links').innerHTML=`
    <a class="extlink" href="https://sf-encyclopedia.com/entry/${sfeSlug}" target="_blank" rel="noopener">SFE ↗</a>
    <a class="extlink" href="https://www.goodreads.com/search?q=${aq}" target="_blank" rel="noopener">Goodreads ↗</a>
    <a class="extlink" href="https://es.wikipedia.org/wiki/${aq}" target="_blank" rel="noopener">Wikipedia ↗</a>
    <a class="extlink" href="https://www.google.com/search?q=${aq}+science+fiction+author" target="_blank" rel="noopener">Buscar ↗</a>`;

  modal.style.display='flex';

  // Bio: ES Wikipedia first, then EN + translate
  try{
    const wq=encodeURIComponent(author.replace(/ /g,'_'));
    let gotBio=false;
    // ES
    try{
      const r=await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${wq}`);
      if(r.ok){
        const d=await r.json();
        if(!d.type?.includes('disambig')&&d.extract&&d.extract.length>50){
          if(d.thumbnail?.source)setCover(coverImg(d.thumbnail.source,'autor'));
          setSyn(d.extract);
          gotBio=true;
        }
      }
    }catch(e){}
    // EN + translate
    if(!gotBio){
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wq}`);
      if(r.ok){
        const d=await r.json();
        if(!d.type?.includes('disambig')&&d.extract&&d.extract.length>50){
          if(d.thumbnail?.source)setCover(coverImg(d.thumbnail.source,'autor'));
          const t=await translate(d.extract.slice(0,1000));
          setSyn(t);
          gotBio=true;
        }
      }
    }
    if(!gotBio)setSyn('Biografía no disponible. Consulta los enlaces externos para más información.');
  }catch(e){setSyn('Biografía no disponible.');}
}

function setMode(mode){
  // Close work modal if open
  document.getElementById('wmodal').style.display='none';
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('m-'+mode)?.classList.add('active');
  document.querySelectorAll('.fpanel').forEach(p=>{p.style.display='none';p.style.cssText='';});
  document.getElementById('fbar').style.display='none';
  document.getElementById('three-wrap').style.pointerEvents='auto';
  const dim=document.getElementById('map-dim');
  const fullModes=['caminos','cronologia','laboratorio','perfil'];
  if(dim)dim.style.opacity=fullModes.includes(mode)?'1':'0';
  if(dim)dim.style.pointerEvents=fullModes.includes(mode)?'auto':'none';

  if(mode==='mapa'){
    aFilter=null;fType=null;buildFBar('cat');
    document.getElementById('fbar').style.display='flex';
    applyFilter();
  } else if(mode==='caminos'){
    buildCaminos();
    document.getElementById('fp-caminos').style.display='block';
    document.getElementById('three-wrap').style.pointerEvents='none';
  } else if(mode==='sensaciones'){
    aFilter=null;fType=null;
    buildFBar('sens');
    document.getElementById('fbar').style.display='flex';
    applyFilter();
    const fp=document.getElementById('fp-sensaciones');
    fp.innerHTML=`<div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.7;max-width:500px">Pulsa una sensación arriba para filtrar el mapa.</div>`;
    fp.style.display='block';
    fp.style.position='fixed';fp.style.top='118px';fp.style.background='none';
    fp.style.bottom='auto';fp.style.pointerEvents='none';fp.style.zIndex='16';
  } else if(mode==='cronologia'){
    buildTimeline();
    document.getElementById('fp-cronologia').style.display='block';
    document.getElementById('three-wrap').style.pointerEvents='none';
  } else if(mode==='laboratorio'){
    buildLab();
    document.getElementById('fp-laboratorio').style.display='block';
    document.getElementById('three-wrap').style.pointerEvents='none';
  } else if(mode==='perfil'){
    buildProfile();
    document.getElementById('fp-perfil').style.display='block';
    document.getElementById('three-wrap').style.pointerEvents='none';
  }
}

function buildFBar(type){
  const bar=document.getElementById('fbar');
  const items=type==='cat'
    ?[['null','todo',{color:'#7b5fff'}],...Object.entries(CATS).map(([k,v])=>[k,v.label,v])]
    :[['null','todo',{color:'#7b5fff'}],...Object.entries(SENSATIONS||{}).map(([k,v])=>[k,`${v.emoji} ${v.label}`,v])];
  const catChips=type==='cat'?'':items.map(([k,label,{color}])=>`<span class="fchip${(!aFilter&&k==='null')||aFilter===k?' on':''}" id="fc-${k}" style="--cc:${color}" onclick="setFilter('${k}','${type}')"><span class="dot" style="background:${color}"></span>${label}</span>`).join('');
  // Work type filter chips — always shown
  const typeChips=[
    ['null','todo',{color:'rgba(255,255,255,.3)'}],
    ['libro','📖 Libros',{color:'#00e5c0'}],
    ['pelicula','🎬 Películas',{color:'#a29bfe'}],
    ['serie','📺 Series',{color:'#f5c518'}],
    ['comic','📓 Cómics',{color:'#ff5c7a'}],
    ['videojuego','🎮 Videojuegos',{color:'#64c864'}],
  ].map(([k,label,{color}])=>`<span class="fchip${(!wTypeFilter&&k==='null')||wTypeFilter===k?' on':''}" id="wt-${k}" style="--cc:${color}" onclick="setWorkType('${k}')">${label}</span>`).join('');
  bar.innerHTML=(catChips?`<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;width:100%;padding-bottom:4px">${catChips}</div>`:'')
    +`<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;width:100%;${catChips?'border-top:1px solid rgba(255,255,255,.06);padding-top:4px':''}">${typeChips}</div>`;
  bar.style.flexDirection='column';bar.style.gap='0';
}

function setWorkType(key){
  wTypeFilter=key==='null'?null:key;
  document.querySelectorAll('[id^="wt-"]').forEach(e=>e.classList.remove('on'));
  document.getElementById('wt-'+key)?.classList.add('on');

function startPath(pid){
  const p=(PATHS||[]).find(x=>x.id===pid);if(!p)return;
  aFilter=pid;fType='path';applyFilter();
  // Show path detail view
  showPathDetail(pid);
}

let pathWorkType=null;

function showPathDetail(pid){
  pathWorkType=wTypeFilter; // inherit global filter
  renderPathDetail(pid,pathWorkType);
}

function renderPathDetail(pid,wt){
  const p=(PATHS||[]).find(x=>x.id===pid);if(!p)return;

  // Collect all works from path nodes
  const allWorks=[];
  p.nodes.filter(id=>NODES[id]).forEach(id=>{
    (NODES[id]?.works||[]).forEach(w=>{
      if(!allWorks.find(x=>x.title===w.title))
        allWorks.push({...w,nodeId:id,nodeLabel:NODES[id].label,nodeColor:nCol[id]||'#fff'});
    });
  });
  const filteredWorks=wt?allWorks.filter(w=>w.type===wt):allWorks;

  const typeFilters=[
    {k:null,label:'Todos',n:allWorks.length},

function renderPathObras(pid,wt){
  const p=(PATHS||[]).find(x=>x.id===pid);if(!p)return '';
  const allWorks=[];
  p.nodes.filter(id=>NODES[id]).forEach(id=>{
    (NODES[id]?.works||[]).forEach(w=>{
      if(!allWorks.find(x=>x.title===w.title))
        allWorks.push({...w,nodeLabel:NODES[id].label,nodeColor:nCol[id]||'#fff'});
    });
  });
  const works=wt?allWorks.filter(w=>w.type===wt):allWorks;
  if(!works.length)return `<div style="text-align:center;padding:2rem;color:var(--muted)">Sin obras de este tipo en este camino.</div>`;
  return `<div style="display:flex;flex-direction:column;gap:6px">
    ${works.map(w=>`
      <div class="wcard" onclick="openWork('${w.title.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${w.type}','${(w.author||"").replace(/'/g,"\\'")}',null)">
        <span class="wbadge ${TB[w.type]||'bl'}">${TL[w.type]||w.type}</span>
        <div class="winfo">
          <div class="wt">${w.title}</div>
          <div style="font-size:10px;color:var(--muted)">${w.author||''} <span style="color:${w.nodeColor};margin-left:4px">· ${w.nodeLabel}</span></div>
        </div>
      </div>`).join('')}
  </div>`;
}

function showPathTab(pid,tab,wt){
  const content=document.getElementById('path-tab-content');
  if(!content)return;
  const nBtn=document.getElementById('ptab-nodos');
  const oBtn=document.getElementById('ptab-obras');
  if(tab==='nodos'){
    if(nBtn){nBtn.style.borderBottomColor='var(--accent)';nBtn.style.color='var(--text)';}
    if(oBtn){oBtn.style.borderBottomColor='transparent';oBtn.style.color='var(--muted)';}
    const p=(PATHS||[]).find(x=>x.id===pid);
    if(p)content.innerHTML=renderPathNodos(p);
  } else {
    if(oBtn){oBtn.style.borderBottomColor='var(--accent)';oBtn.style.color='var(--text)';}
    if(nBtn){nBtn.style.borderBottomColor='transparent';nBtn.style.color='var(--muted)';}
    content.innerHTML=renderPathObras(pid,wt==='null'?null:wt);
  }
}

function computeLabResults(){
  if(labSelected.length===0)return[];
  const wm=[];
  Object.entries(WORK_DNA||{}).forEach(([title,d])=>{
    const dn=d.dna.map(e=>e.node);
    const matches=labSelected.filter(id=>dn.includes(id));
    if(matches.length>0){
      const avgPct=matches.reduce((s,id)=>{const e=d.dna.find(x=>x.node===id);return s+(e?.pct||0);},0)/labSelected.length;
      wm.push({title,type:d.type,author:d.author,matches:matches.length,total:labSelected.length,pct:Math.round(avgPct)});
    }
  });
  return wm.sort((a,b)=>b.pct*b.matches-a.pct*a.matches);
}

function labToggle(id){
  const i=labSelected.indexOf(id);
  if(i>-1)labSelected.splice(i,1);
  else if(labSelected.length<6)labSelected.push(id);
  renderLab();
  // Re-open the details that was active
  setTimeout(()=>{
    // Keep details open after re-render
  },10);
}

function generateTitle(ids){
  const labels=ids.map(id=>NODES[id]?.label||id);
  const combos=[
    `El ${labels[0]} de ${labels[1]||''}`,
    `${labels[0]} y ${labels[1]||''}`,
    `Más allá del ${labels[0]}`,
    `Los herederos del ${labels[0]}`,
    `Cuando el ${labels[0]} encontró al ${labels[1]||'vacío'}`,
    `El último ${labels[0]}`,
  ];
  return combos[ids.length%combos.length];
}

function generateHypothetical(ids){
  const nodes=ids.map(id=>NODES[id]).filter(Boolean);
  const descs=nodes.map(n=>n.desc.split('.')[0]).join('. ');
  const works=ids.flatMap(id=>NODES[id]?.works?.slice(0,2)||[]).map(w=>w.title);
  const uniqueWorks=[...new Set(works)].slice(0,3);
  return `Una obra que combinaría ${nodes.map(n=>n.label).join(', ')}. ${descs}. En el espíritu de ${uniqueWorks.join(', ')}, exploraría la intersección de estos conceptos llevándolos a sus consecuencias más extremas.`;
}

// ══ MAP MODES ════════════════════════════
let mapMode='normal'; // normal | galaxy | journey
let journeyInterval=null;
let journeyIndex=0;

function setMapMode(mode){
  mapMode=mode;
  // Update mode buttons
  if(mode==='galaxy') activateGalaxy();
  else if(mode==='journey') activateJourney();
  else deactivateSpecialModes();
}

function activateGalaxy(){
  deactivateSpecialModes();
  mapMode='galaxy';
  // Reorganize nodes into category clusters
  const catKeys=Object.keys(CATS);
  const clusterRadius=480;
  catKeys.forEach((cat,ci)=>{
    const angle=(ci/catKeys.length)*Math.PI*2;
    const cx=Math.cos(angle)*clusterRadius;
    const cy=Math.sin(angle)*clusterRadius*.55;
    const cz=Math.sin(angle*1.7)*clusterRadius*.45;
    const catIds=CATS[cat].ids.filter(id=>meshes[id]);
    catIds.forEach((id,ni)=>{
      const na=(ni/Math.max(catIds.length,1))*Math.PI*2;
      const nr=80+Math.random()*60;
      pos3d[id]={x:cx+Math.cos(na)*nr,y:cy+Math.sin(na)*nr*.8,z:cz+Math.sin(na*1.3)*nr*.6};
      const mesh=meshes[id];
      if(mesh){
        // Animate to new position
        mesh.position.set(pos3d[id].x,pos3d[id].y,pos3d[id].z);
      }
      const lbl=labels[id];
      if(lbl){lbl.style.transition='left .8s, top .8s';}
    });
  });
  updateEdgePositions();
  // Show category name labels
  showToast('🌌 Vista Galaxia — cada constelación es una categoría');
  tR=1600;autoRot=true;
}

function activateJourney(){
  deactivateSpecialModes();
  mapMode='journey';
  autoRot=false;
  // Add journey indicator
  const existing=document.getElementById('journey-indicator');
  if(!existing){
    const ind=document.createElement('div');
    ind.id='journey-indicator';
    ind.style.cssText='position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(123,95,255,.2);border:1px solid rgba(123,95,255,.4);border-radius:20px;padding:5px 14px;font-size:11px;color:#a29bfe;letter-spacing:1px;pointer-events:none';
    ind.textContent='🚀 MODO VIAJE — toca para detener';
    ind.onclick=()=>{setMapMode('normal');ind.remove();};
    ind.style.pointerEvents='auto';
    document.body.appendChild(ind);
  }

  const journeyPath=[...nids].sort(()=>Math.random()-.5);
  journeyIndex=0;
  function nextNode(){
    if(mapMode!=='journey'){
      const ind=document.getElementById('journey-indicator');
      if(ind)ind.remove();
      return;
    }
    const id=journeyPath[journeyIndex%journeyPath.length];
    journeyIndex++;
    hlNode(id);
    const p=pos3d[id];
    if(p){
      const len=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z)||1;
      tPhi=Math.acos(Math.max(-1,Math.min(1,p.y/len)));
      tTheta=Math.atan2(p.x,p.z);
      tR=480;
    }
    // Update indicator
    const ind=document.getElementById('journey-indicator');
    if(ind&&NODES[id])ind.textContent=`🚀 ${NODES[id].label} — toca para detener`;
    journeyInterval=setTimeout(nextNode,3800);
  }
  nextNode();
}

function deactivateSpecialModes(){
  if(journeyInterval){clearTimeout(journeyInterval);journeyInterval=null;}
  mapMode='normal';
  hlNode(null);
}

function updateEdgePositions(){
  const T=window.THREE;if(!T)return;
  Object.entries(edges).forEach(([key,line])=>{
    const [id1,id2]=key.split('|');
    const p1=pos3d[id1],p2=pos3d[id2];
    if(!p1||!p2)return;
    const pts=[new T.Vector3(p1.x,p1.y,p1.z),new T.Vector3(p2.x,p2.y,p2.z)];
    line.geometry.setFromPoints(pts);
    line.geometry.needsUpdate=true;
  });
}

function showToast(msg){
  document.getElementById('toast-text').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ══ START ════════════════════════════════
function startApp(){
  document.getElementById('intro').style.display='none';
  ['hdr','mbar','fbar','zoom','stats'].forEach(id=>document.getElementById(id).style.display='flex');
  document.getElementById('sn').textContent=nids.length;
  document.getElementById('sw').textContent=TW;
  document.getElementById('sc').textContent=TC;
  buildFBar('cat');
  buildLegend();
  document.getElementById('legend').style.display='block';
  // Force resize after intro hides — critical for correct canvas dimensions
  requestAnimationFrame(()=>{
    resizeR();
    // If fallback 2D is active, resize it too
    const fb=document.querySelector('#three-wrap canvas');
    if(fb&&!renderer){
      fb.width=window.innerWidth;
      fb.height=window.innerHeight;
      fb.style.width='100%';fb.style.height='100%';
    }
  });
}

// ══ 2D FALLBACK (if Three.js fails) ══════
function showFallback2D(){
  console.log('Using 2D fallback renderer');
  const wrap=document.getElementById('three-wrap');
  const cv=document.createElement('canvas');
  cv.style.cssText='position:absolute;inset:0;width:100%;height:100%';
  wrap.appendChild(cv);
  const ctx=cv.getContext('2d');
  let W,H,pos2d={},animId;

  function resize2d(){W=cv.width=wrap.clientWidth||window.innerWidth;H=cv.height=wrap.clientHeight||window.innerHeight;}
  resize2d();window.addEventListener('resize',resize2d);

  // Simple 2D force layout
  nids.forEach((id,i)=>{
    const a=(i/nids.length)*Math.PI*2;
    const r=100+Math.random()*200;
    pos2d[id]={x:Math.cos(a)*r,y:Math.sin(a)*r,vx:0,vy:0};
  });
  for(let it=0;it<200;it++){
    const f={};nids.forEach(id=>{f[id]={x:0,y:0};});
    for(let i=0;i<nids.length;i++){for(let j=i+1;j<nids.length;j++){
      const a=nids[i],b=nids[j],pa=pos2d[a],pb=pos2d[b];
      const dx=pb.x-pa.x,dy=pb.y-pa.y,d=Math.sqrt(dx*dx+dy*dy)||1,rep=4000/(d*d);
      f[a].x-=dx/d*rep;f[a].y-=dy/d*rep;f[b].x+=dx/d*rep;f[b].y+=dy/d*rep;
    }}
    nids.forEach(id=>{
      const p=pos2d[id];
      (NODES[id]?.connections||[]).forEach(cid=>{
        const pc=pos2d[cid];if(!pc)return;
        const dx=pc.x-p.x,dy=pc.y-p.y,d=Math.sqrt(dx*dx+dy*dy)||1,att=.02*(d-130);
        f[id].x+=dx/d*att;f[id].y+=dy/d*att;
      });
      f[id].x-=p.x*.001;f[id].y-=p.y*.001;
    });
    nids.forEach(id=>{pos2d[id].x+=f[id].x*.2;pos2d[id].y+=f[id].y*.2;});
  }

  let camX=0,camY=0,scale2=.65;
  let drag2=false,dx2=0,dy2=0,cx2=0,cy2=0,moved2=false;

  function draw2d(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
    bg.addColorStop(0,'#070718');bg.addColorStop(1,'#04040f');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const cx=W/2+(0-camX)*scale2,cy2v=H/2+(0-camY)*scale2;

    // Edges
    nids.forEach(id=>{
      const pa=pos2d[id];
      (NODES[id]?.connections||[]).forEach(cid=>{
        if(cid<id||!pos2d[cid])return;
        const pb=pos2d[cid];
        const isSel=selId===id||selId===cid;
        ctx.beginPath();
        ctx.moveTo(W/2+(pa.x-camX)*scale2,H/2+(pa.y-camY)*scale2);
        ctx.lineTo(W/2+(pb.x-camX)*scale2,H/2+(pb.y-camY)*scale2);
        ctx.strokeStyle=isSel?`${nCol[id]}99`:'rgba(255,255,255,.07)';
        ctx.lineWidth=isSel?1.5:.7;ctx.stroke();
      });
    });

    // Nodes
    nids.forEach(id=>{
      const p=pos2d[id];
      const sx=W/2+(p.x-camX)*scale2,sy=H/2+(p.y-camY)*scale2;
      const r=(6+(NODES[id]?.connections?.length||0)*.6)*scale2;
      const col=nCol[id]||'#7b5fff';
      const isSel=selId===id,isConn=selId&&(NODES[selId]?.connections||[]).includes(id);
      const dim=selId&&!isSel&&!isConn;
      ctx.globalAlpha=dim?.1:1;
      const g=ctx.createRadialGradient(sx-r*.2,sy-r*.2,0,sx,sy,r);
      g.addColorStop(0,isSel?'#fff':col+'ff');g.addColorStop(1,col+'77');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      if(scale2>.5||isSel||isConn){
        const fs=Math.max(9,Math.min(12,10*scale2));
        ctx.font=`${isSel?'700':'500'} ${fs}px sans-serif`;ctx.textAlign='center';
        ctx.fillStyle=isSel?'rgba(255,255,255,.95)':`rgba(255,255,255,${isSel?1:isConn?.85:.6})`;
        ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=5;
        ctx.fillText(NODES[id].label,sx,sy+r+fs+2);ctx.shadowBlur=0;
      }
    });
    animId=requestAnimationFrame(draw2d);
  }
  draw2d();

  // Hit test 2D
  function hit2d(mx,my){
    let best=null,bd=Infinity;
    nids.forEach(id=>{
      const p=pos2d[id];
      const sx=W/2+(p.x-camX)*scale2,sy=H/2+(p.y-camY)*scale2;
      const r=(6+(NODES[id]?.connections?.length||0)*.6)*scale2+8;
      const d=Math.sqrt((mx-sx)**2+(my-sy)**2);
      if(d<r&&d<bd){bd=d;best=id;}
    });
    return best;
  }

  cv.addEventListener('mousedown',e=>{drag2=true;moved2=false;dx2=e.clientX;dy2=e.clientY;cx2=camX;cy2=camY;});
  cv.addEventListener('mousemove',e=>{if(drag2){const ddx=e.clientX-dx2,ddy=e.clientY-dy2;if(Math.abs(ddx)>3||Math.abs(ddy)>3)moved2=true;camX=cx2-ddx/scale2;camY=cy2-ddy/scale2;}});
  cv.addEventListener('mouseup',e=>{drag2=false;if(!moved2){const h=hit2d(e.clientX,e.clientY);if(h)openNode(h);else closePanel();}});
  cv.addEventListener('wheel',e=>{e.preventDefault();scale2=Math.max(.15,Math.min(4,scale2*(e.deltaY>0?.9:1.1)));},{passive:false});

  let td2=false,tx2=0,ty2=0,tcx=0,tcy=0,tm2=false;
  cv.addEventListener('touchstart',e=>{td2=true;tm2=false;tx2=e.touches[0].clientX;ty2=e.touches[0].clientY;tcx=camX;tcy=camY;},{passive:true});
  cv.addEventListener('touchmove',e=>{e.preventDefault();if(td2){const ddx=e.touches[0].clientX-tx2,ddy=e.touches[0].clientY-ty2;if(Math.abs(ddx)>4||Math.abs(ddy)>4)tm2=true;camX=tcx-ddx/scale2;camY=tcy-ddy/scale2;}},{passive:false});
  cv.addEventListener('touchend',e=>{td2=false;if(!tm2&&e.changedTouches.length>0){const t=e.changedTouches[0];const h=hit2d(t.clientX,t.clientY);if(h)openNode(h);else closePanel();}},{passive:true});

  // Store ref for filter
  window.fallback2D={pos2d,applyFilter2d:function(){/* handled in draw */}};
}


// ══ BOOT ═════════════════════════════════
window.addEventListener('load',function(){
  if(typeof NODES==='undefined'){
    const tap=document.querySelector('.intro-tap');
    if(tap)tap.textContent='error al cargar — recarga la página';
    return;
  }
  nids=Object.keys(NODES);
  nids.forEach(id=>{if(!nCol[id])nCol[id]='#7b5fff';TW+=(NODES[id]?.works?.length||0);TC+=(NODES[id]?.connections?.length||0);});
  TC=Math.round(TC/2);
  

  // Add secret node IDs to color maps
  Object.values(SECRET_NODES||{}).forEach(sn=>{if(!nCol[sn.id])nCol[sn.id]=sn.color||'#ffffff';});

  initIntro();

  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js';
  s.onload=()=>{
    console.log('Three.js loaded, initializing...');
    try{initThree();console.log('Three.js initialized OK');}
    catch(e){console.error('Three.js init error:',e);showFallback2D();}
  };
  s.onerror=()=>{console.error('Three.js failed to load');showFallback2D();};
  document.head.appendChild(s);

  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()))
      .then(()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
  }
});
</script>
</body>
